<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-FLIX: Premium Chinese Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Maitree:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --app-bg: #080303; /* สีพื้นหลังดำอมแดงเข้ม */
            --primary-red: #c8102e; /* สีแดงเข้มแบบจีน */
            --gold-accent: #d4af37; /* สีทองโบราณ */
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
        }

        .font-maitree { font-family: 'Maitree', serif; }

        /* ซ่อน Scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* เอฟเฟกต์สีทองและสีแดง */
        .text-glow-red { text-shadow: 0 0 15px rgba(200, 16, 46, 0.7); }
        .text-glow-gold { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* ลวดลายจีนโบราณจางๆ ที่พื้นหลัง */
        .chinese-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23d4af37' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-flare {
            position: absolute;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(200,16,46,0.15) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none; z-index: 0;
        }

        /* TikTok Style Scroll Snap */
        .tiktok-scroll-container {
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .tiktok-video-item {
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
        }
        .tiktok-video-item video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Nav & Tabs */
        .nav-btn { color: #6b7280; transition: all 0.3s; }
        .nav-btn.active { color: var(--gold-accent); }
        
        .cat-btn { transition: all 0.2s; }
        .cat-btn.active { 
            background: linear-gradient(to bottom, var(--primary-red), #800000); 
            color: white; 
            border-color: var(--primary-red); 
            box-shadow: 0 2px 10px rgba(200,16,46,0.4);
        }

        /* Banner Transitions */
        .slide-fade { animation: fadeEffect 0.5s ease-in-out; }
        @keyframes fadeEffect { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Mobile Container -->
    <div class="relative w-full max-w-md h-[100dvh] bg-[var(--app-bg)] overflow-hidden flex flex-col shadow-2xl border-x border-[#3a0b0b]">
        
        <!-- ลวดลายพื้นหลัง -->
        <div class="chinese-pattern"></div>
        <div class="bg-flare top-0 right-0"></div>
        <div class="bg-flare bottom-1/4 left-0"></div>

        <!-- Header -->
        <header id="main-header" class="absolute top-0 w-full z-50 px-4 py-4 bg-gradient-to-b from-black/90 via-black/60 to-transparent">
            <div class="flex justify-between items-center h-10">
                <h1 class="text-3xl font-black font-maitree text-[var(--primary-red)] tracking-widest text-glow-red">ตำนานหอหมื่นลี้</h1>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleSearch()" class="text-[var(--gold-accent)] hover:text-white transition"><i data-lucide="search" class="w-6 h-6"></i></button>
                    <div class="w-8 h-8 rounded-full gold-border overflow-hidden p-0.5">
                        <img src="https://i.pravatar.cc/100" class="w-full h-full rounded-full object-cover">
                    </div>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div id="search-container" class="hidden mt-3 slide-fade">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="ค้นหาชื่อตำนาน..." class="w-full bg-black/50 gold-border rounded-full py-2 pl-10 pr-4 text-[var(--gold-accent)] placeholder-gray-500 focus:outline-none focus:border-[var(--primary-red)] text-sm font-maitree">
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto hide-scrollbar relative z-10 pb-20">
            <!-- ข้อมูลจะถูก render ที่นี่ -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="absolute bottom-0 w-full h-[70px] bg-gradient-to-t from-[#050000] via-[#0a0505]/95 to-transparent z-50 flex justify-around items-center px-2 pb-2 border-t border-[var(--gold-accent)]/20">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">หน้าหลัก</span>
            </button>
            <button onclick="switchTab('miniseries')" id="nav-miniseries" class="nav-btn flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="smartphone" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">มินิซีรีส์</span>
            </button>
            <button onclick="switchTab('library')" id="nav-library" class="nav-btn flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="book-open" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">ตำราของฉัน</span>
            </button>
        </nav>

    </div>

    <script>
        // --- 1. ข้อมูลฐาน (Database) ---
        const categories = ["ทั้งหมด", "ยุทธภพ", "วังหลวง", "เทพเซียน", "สืบสวน", "โรแมนติก"];
        const sampleVideos = [
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
        ];
        
        // วิดีโอแนวตั้งสำหรับ Mini Series
        const verticalVideos = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/VolkswagenGTIReview.mp4"
        ];

        let moviesData = [];

        // สร้างข้อมูลหนัง 50 เรื่องอัตโนมัติ พร้อมสร้างตอน (Episodes)
        function generateData() {
            const adjectives = ["ตำนาน", "ลิขิต", "เล่ห์รัก", "กระบี่", "จอมยุทธ", "วิญญาณ", "สวรรค์", "หยาดตะวัน", "มังกร", "บุปผา"];
            const nouns = ["วังต้องห้าม", "เย้ยพิภพ", "ผ่าบัลลังก์", "ไร้พ่าย", "ซ่อนพิษ", "ล่าปีศาจ", "ไร้เงา", "ข้ามภพ", "สังหาร", "หมื่นลี้"];
            const epNames = ["ปฐมบท", "แผนลวง", "รอยแค้น", "คราบน้ำตา", "หักเหลี่ยม", "พบพาน", "บทสรุป"];

            for(let i=1; i<=50; i++) {
                const title = adjectives[i%10] + nouns[(i*3)%10] + (i <= 5 ? " ภาค " + i : "");
                const type = i > 40 ? 'miniseries' : 'movie'; 
                const category = type === 'miniseries' ? 'มินิซีรีส์' : categories[(i % (categories.length - 1)) + 1];
                
                // สร้างตอน (Episodes) สำหรับหนังทั่วไป
                let episodesList = [];
                if(type === 'movie') {
                    const numEps = Math.floor(Math.random() * 4) + 3; // 3 ถึง 6 ตอน
                    for(let j=0; j<numEps; j++) {
                        episodesList.push({
                            ep: j + 1,
                            title: epNames[j % epNames.length],
                            videoUrl: sampleVideos[j % sampleVideos.length]
                        });
                    }
                } else {
                    episodesList.push({ ep: 1, title: "ตอนที่ 1", videoUrl: verticalVideos[i % verticalVideos.length] });
                }

                moviesData.push({
                    id: i,
                    title: title,
                    description: `ตำนานกล่าวขานถึงเรื่องราวของ ${title} การทรยศหักหลังในวังหลวง ความรักข้ามภพชาติ และการต่อสู้แย่งชิงความเป็นหนึ่งในยุทธภพ...`,
                    cover: `https://picsum.photos/seed/${i*10}/800/1200`,
                    poster: `https://picsum.photos/seed/${i*20}/400/600`,
                    rating: (Math.random() * 1.5 + 8.5).toFixed(1), // เรตติ้ง 8.5 - 10.0
                    year: 2020 + (i % 5),
                    genre: category,
                    type: type,
                    episodes: episodesList
                });
            }
        }
        generateData();

        // --- 2. State Management ---
        let state = {
            tab: 'home',
            category: 'ทั้งหมด',
            searchQuery: '',
            bannerIndex: 0,
            activeMovie: null,
            activeEpisodeIndex: 0,
            view: 'main'
        };

        let bannerInterval;

        // --- 3. การควบคุม UI หลัก ---
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            startBannerAutoPlay();
        });

        function switchTab(tabId) {
            state.tab = tabId;
            state.view = 'main';
            state.searchQuery = '';
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');
            
            renderApp();
        }

        function setCategory(cat) {
            state.category = cat;
            renderApp();
        }

        function toggleSearch() {
            const searchContainer = document.getElementById('search-container');
            searchContainer.classList.toggle('hidden');
            if(!searchContainer.classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            } else {
                state.searchQuery = '';
                document.getElementById('search-input').value = '';
                renderApp();
            }
        }

        function handleSearch(query) {
            state.searchQuery = query.toLowerCase();
            renderApp();
        }

        function openPlayer(id) {
            state.activeMovie = moviesData.find(m => m.id === id);
            state.activeEpisodeIndex = 0; // เริ่มที่ตอน 1 เสมอ
            state.view = 'player';
            renderApp();
        }

        function closePlayer() {
            state.view = 'main';
            state.activeMovie = null;
            renderApp();
        }

        function changeEpisode(index) {
            state.activeEpisodeIndex = index;
            renderApp(); // Render ใหม่เพื่อให้เพลเยอร์เปลี่ยนวิดีโอ
        }

        // --- 4. Logic แบนเนอร์สไลด์ ---
        function startBannerAutoPlay() {
            clearInterval(bannerInterval);
            bannerInterval = setInterval(() => {
                if (state.tab === 'home' && state.view === 'main' && !state.searchQuery) {
                    state.bannerIndex = (state.bannerIndex + 1) % 5;
                    renderHomeBannerOnly();
                }
            }, 5000);
        }

        function renderHomeBannerOnly() {
            const bannerContainer = document.getElementById('hero-banner-container');
            if (bannerContainer) {
                bannerContainer.innerHTML = generateBannerHTML();
                lucide.createIcons();
            }
        }

        // --- 5. Render Functions ---
        function renderApp() {
            const content = document.getElementById('app-content');
            const header = document.getElementById('main-header');
            const nav = document.getElementById('bottom-nav');

            if (state.view === 'player') {
                header.style.display = 'none';
                nav.style.display = 'none';
                content.innerHTML = generateStandardPlayer();
            } else if (state.tab === 'miniseries') {
                header.style.display = 'none';
                nav.style.display = 'flex';
                content.innerHTML = generateMiniSeriesHTML();
                setupTikTokObserver();
            } else {
                header.style.display = 'block';
                nav.style.display = 'flex';
                
                if (state.tab === 'home') content.innerHTML = generateHomeHTML();
                if (state.tab === 'library') content.innerHTML = generateLibraryHTML();
            }
            
            lucide.createIcons();
            if(state.view !== 'player') content.scrollTop = 0;
        }

        // --- 6. HTML Generators ---

        function generateBannerHTML() {
            const hero = moviesData[state.bannerIndex];
            return `
                <div class="relative w-full h-[75vh] slide-fade border-b-2 border-[var(--gold-accent)]/30" id="hero-banner">
                    <img src="${hero.cover}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-[var(--app-bg)] via-[var(--app-bg)]/40 to-transparent"></div>
                    
                    <div class="absolute bottom-0 w-full px-5 pb-8 flex flex-col items-center text-center">
                        <span class="text-[var(--gold-accent)] border border-[var(--gold-accent)]/50 px-3 py-1 rounded-sm text-[10px] font-bold tracking-widest mb-3 bg-black/30 backdrop-blur-sm font-maitree">ยอดนิยมอันดับ ${state.bannerIndex + 1}</span>
                        <h2 class="text-4xl font-bold font-maitree text-white text-glow-gold mb-2 leading-tight">
                            ${hero.title}
                        </h2>
                        
                        <div class="flex items-center gap-3 text-xs font-semibold text-gray-300 mb-5 font-maitree">
                            <span class="text-[var(--primary-red)]"><i data-lucide="star" class="w-3 h-3 inline fill-current"></i> ${hero.rating}</span>
                            <span class="text-[var(--gold-accent)]">•</span>
                            <span>${hero.genre}</span>
                            <span class="text-[var(--gold-accent)]">•</span>
                            <span>ตอนที่ 1-${hero.episodes.length}</span>
                        </div>
                        
                        <div class="flex gap-4 w-full max-w-[280px]">
                            <button onclick="openPlayer(${hero.id})" class="flex-1 bg-gradient-to-r from-[var(--primary-red)] to-[#800000] text-white py-3 rounded-full font-bold text-sm flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(200,16,46,0.6)] font-maitree border border-red-500/50">
                                <i data-lucide="play" class="fill-current w-4 h-4 text-[var(--gold-accent)]"></i> รับชมตำนาน
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function generateHomeHTML() {
            let filteredMovies = moviesData.filter(m => m.type === 'movie');
            
            if (state.searchQuery) {
                filteredMovies = filteredMovies.filter(m => m.title.toLowerCase().includes(state.searchQuery));
            } else if (state.category !== 'ทั้งหมด') {
                filteredMovies = filteredMovies.filter(m => m.genre === state.category);
            }

            let html = '';

            if (!state.searchQuery && state.category === 'ทั้งหมด') {
                html += `<div id="hero-banner-container">${generateBannerHTML()}</div>`;
            } else {
                html += `<div class="h-28"></div>`;
            }

            // Categories Pills
            html += `
                <div class="px-4 py-3 sticky top-0 z-30 bg-[#0a0505]/95 backdrop-blur-md border-b border-[var(--gold-accent)]/20 shadow-lg">
                    <div class="flex gap-3 overflow-x-auto hide-scrollbar">
            `;
            categories.forEach(cat => {
                const isActive = state.category === cat;
                html += `<button onclick="setCategory('${cat}')" class="cat-btn px-4 py-1.5 rounded-full border border-[var(--gold-accent)]/30 text-xs font-maitree whitespace-nowrap tracking-wide ${isActive ? 'active' : 'text-[var(--gold-accent)] hover:bg-white/5'}">${cat}</button>`;
            });
            html += `</div></div>`;

            // Movie List
            html += `<div class="px-4 py-6">`;
            
            if (state.searchQuery) {
                html += `<h3 class="font-maitree text-gray-400 mb-4 text-sm">ม้วนคัมภีร์ที่ค้นพบ: <span class="text-[var(--gold-accent)]">"${state.searchQuery}"</span></h3>`;
            } else {
                const headText = state.category === 'ทั้งหมด' ? 'ยอดตำนานมาใหม่' : `หมวด: ${state.category}`;
                html += `<h3 class="text-xl font-bold font-maitree text-[var(--gold-accent)] mb-4 border-l-2 border-[var(--primary-red)] pl-3 text-glow-gold">${headText}</h3>`;
            }

            if (filteredMovies.length === 0) {
                html += `<div class="text-center py-10 font-maitree text-gray-500">ไม่พบตำนานที่ท่านค้นหา</div>`;
            } else {
                html += `<div class="grid grid-cols-3 gap-3">`;
                filteredMovies.forEach(movie => {
                    html += `
                        <div class="flex flex-col cursor-pointer group" onclick="openPlayer(${movie.id})">
                            <div class="relative w-full aspect-[2/3] rounded-sm overflow-hidden mb-2 gold-border shadow-md">
                                <img src="${movie.poster}" loading="lazy" class="w-full h-full object-cover opacity-90 transition-all duration-500 group-hover:scale-110 group-hover:opacity-100">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                <div class="absolute inset-0 bg-[var(--primary-red)]/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                    <i data-lucide="play-circle" class="w-8 h-8 text-[var(--gold-accent)]"></i>
                                </div>
                                <div class="absolute top-1 right-1 bg-black/80 px-1.5 rounded text-[9px] text-[var(--gold-accent)] font-bold border border-[var(--gold-accent)]/50">${movie.episodes.length} ตอน</div>
                            </div>
                            <h4 class="text-sm font-semibold font-maitree text-gray-200 truncate group-hover:text-[var(--gold-accent)] transition-colors">${movie.title}</h4>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            html += `</div>`;

            return html;
        }

        // --- 7. Mini Series (TikTok Style) โฉมใหม่ ---
        function generateMiniSeriesHTML() {
            const miniseries = moviesData.filter(m => m.type === 'miniseries');
            let html = `<div class="tiktok-scroll-container" id="tiktok-container">`;
            
            miniseries.forEach((movie) => {
                html += `
                    <div class="tiktok-video-item">
                        <video src="${movie.episodes[0].videoUrl}" poster="${movie.cover}" loop muted playsinline data-id="${movie.id}"></video>
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/10 to-transparent pointer-events-none"></div>
                        
                        <!-- Header แบบมินิมอล -->
                        <div class="absolute top-12 left-0 w-full flex justify-center z-20 pointer-events-none">
                            <span class="text-[var(--gold-accent)] font-maitree text-lg font-bold text-glow-gold tracking-widest opacity-80">มินิซีรีส์</span>
                        </div>

                        <!-- Right Actions (เหลือแค่แชร์ และ เปิดเสียง) -->
                        <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6 z-20">
                            <!-- ปุ่มแชร์ -->
                            <div class="flex flex-col items-center group cursor-pointer">
                                <div class="w-12 h-12 bg-black/50 border border-[var(--gold-accent)]/30 rounded-full flex items-center justify-center backdrop-blur-md group-hover:bg-[var(--primary-red)]/80 transition">
                                    <i data-lucide="share-2" class="w-5 h-5 text-[var(--gold-accent)]"></i>
                                </div>
                                <span class="text-[10px] font-maitree mt-1 text-gray-300">ส่งต่อ</span>
                            </div>

                            <!-- ปุ่มเปิด/ปิดเสียง -->
                            <div class="flex flex-col items-center cursor-pointer mt-2" onclick="toggleMute(this)">
                                <div class="w-12 h-12 bg-black/50 border border-[var(--gold-accent)]/30 rounded-full flex items-center justify-center backdrop-blur-md transition sound-btn-bg">
                                    <i data-lucide="volume-x" class="w-5 h-5 text-gray-400 mute-icon"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Bottom Info -->
                        <div class="absolute bottom-20 left-5 right-20 z-20">
                            <span class="bg-[var(--primary-red)] text-white px-2 py-0.5 rounded text-[10px] font-bold mb-2 inline-block font-maitree border border-red-400">Exclusive</span>
                            <h2 class="text-2xl font-bold font-maitree text-[var(--gold-accent)] mb-1 text-glow-gold">${movie.title}</h2>
                            <p class="text-sm text-gray-300 line-clamp-2 font-prompt opacity-90 leading-relaxed">
                                ${movie.description}
                            </p>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        function setupTikTokObserver() {
            const videos = document.querySelectorAll('.tiktok-video-item video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(e => console.log("Auto-play prevented", e));
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.7 });

            videos.forEach(video => {
                observer.observe(video);
                video.addEventListener('click', () => {
                    if (video.paused) video.play(); else video.pause();
                });
            });
        }

        function toggleMute(btnElement) {
            const container = btnElement.closest('.tiktok-video-item');
            const video = container.querySelector('video');
            const icon = btnElement.querySelector('.mute-icon');
            const bg = btnElement.querySelector('.sound-btn-bg');

            if (video.muted) {
                video.muted = false;
                icon.setAttribute('data-lucide', 'volume-2');
                icon.classList.replace('text-gray-400', 'text-[var(--gold-accent)]');
                bg.classList.replace('bg-black/50', 'bg-[var(--primary-red)]/80');
            } else {
                video.muted = true;
                icon.setAttribute('data-lucide', 'volume-x');
                icon.classList.replace('text-[var(--gold-accent)]', 'text-gray-400');
                bg.classList.replace('bg-[var(--primary-red)]/80', 'bg-black/50');
            }
            lucide.createIcons();
        }

        function generateLibraryHTML() {
            return `
                <div class="pt-20 px-4 h-full flex flex-col items-center justify-center text-center pb-20 font-maitree">
                    <div class="w-20 h-20 rounded-full border-2 border-[var(--gold-accent)]/50 flex items-center justify-center mb-6 bg-black/50">
                        <i data-lucide="book" class="w-10 h-10 text-[var(--gold-accent)]"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-[var(--gold-accent)] mb-2">หอตำราลับ</h2>
                    <p class="text-sm text-gray-400 mb-8 font-prompt">ท่านยังไม่ได้เก็บรวบรวมม้วนคัมภีร์ใดๆ ไว้ในหอตำรา</p>
                    <button onclick="switchTab('home')" class="border border-[var(--primary-red)] text-[var(--primary-red)] px-8 py-2.5 rounded-sm font-bold text-sm hover:bg-[var(--primary-red)] hover:text-[var(--gold-accent)] transition">
                        ค้นหาตำนาน
                    </button>
                </div>
            `;
        }

        // --- 8. Standard Player (หน้ารายละเอียด และ ระบบตอน) ---
        function generateStandardPlayer() {
            const movie = state.activeMovie;
            const currentEp = movie.episodes[state.activeEpisodeIndex];

            // สร้างรายชื่อตอน
            let episodesHTML = '';
            movie.episodes.forEach((ep, idx) => {
                const isActive = idx === state.activeEpisodeIndex;
                episodesHTML += `
                    <div onclick="changeEpisode(${idx})" class="flex items-center gap-4 p-3 rounded-md cursor-pointer transition-all ${isActive ? 'bg-[var(--primary-red)]/20 border border-[var(--primary-red)]/50' : 'bg-black/40 hover:bg-white/5 border border-[var(--gold-accent)]/10'}">
                        <div class="w-12 h-8 rounded flex justify-center items-center shrink-0 ${isActive ? 'bg-[var(--primary-red)] text-[var(--gold-accent)]' : 'bg-black text-gray-500 border border-[var(--gold-accent)]/20'} font-bold font-maitree text-sm">
                            EP ${ep.ep}
                        </div>
                        <div class="flex-1">
                            <h4 class="font-semibold text-sm font-maitree ${isActive ? 'text-[var(--gold-accent)]' : 'text-gray-300'}">${ep.title}</h4>
                        </div>
                        ${isActive ? '<i data-lucide="play-circle" class="w-5 h-5 text-[var(--primary-red)]"></i>' : '<i data-lucide="lock" class="w-4 h-4 text-gray-600"></i>'}
                    </div>
                `;
            });

            return `
                <div class="w-full h-full flex flex-col bg-[var(--app-bg)]">
                    <!-- Video Section -->
                    <div class="relative w-full aspect-video bg-black sticky top-0 z-50 border-b border-[var(--gold-accent)]/30">
                        <button onclick="closePlayer()" class="absolute top-4 left-4 z-50 w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-[var(--gold-accent)] hover:bg-[var(--primary-red)] transition backdrop-blur-md border border-[var(--gold-accent)]/30">
                            <i data-lucide="chevron-left" class="w-6 h-6"></i>
                        </button>
                        <!-- วิดีโอจะเปลี่ยนตาม Source ที่เลือก -->
                        <video controls autoplay playsinline poster="${movie.cover}" class="w-full h-full outline-none">
                            <source src="${currentEp.videoUrl}" type="video/mp4">
                        </video>
                    </div>

                    <!-- Detail Section -->
                    <div class="flex-1 overflow-y-auto px-4 py-5 hide-scrollbar">
                        <h1 class="text-3xl font-bold font-maitree text-[var(--gold-accent)] mb-2 text-glow-gold">${movie.title}</h1>
                        
                        <div class="flex items-center gap-3 text-xs text-gray-400 mb-4 font-maitree">
                            <span class="text-[var(--primary-red)] border border-[var(--primary-red)] px-1.5 rounded-sm">เรตติ้ง ${movie.rating}</span>
                            <span class="text-[var(--gold-accent)]">•</span>
                            <span>${movie.year}</span>
                            <span class="text-[var(--gold-accent)]">•</span>
                            <span>หมวด: ${movie.genre}</span>
                        </div>

                        <p class="text-sm text-gray-300 mb-6 leading-relaxed opacity-90">${movie.description}</p>

                        <!-- Actions -->
                        <div class="flex justify-around mb-8 border-y border-[var(--gold-accent)]/20 py-4">
                            <button class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] transition">
                                <i data-lucide="bookmark-plus" class="w-6 h-6"></i>
                                <span class="text-[10px] font-maitree">เก็บเข้าหอตำรา</span>
                            </button>
                            <button class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] transition">
                                <i data-lucide="share-2" class="w-6 h-6"></i>
                                <span class="text-[10px] font-maitree">ส่งมอบ</span>
                            </button>
                            <button class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] transition">
                                <i data-lucide="download" class="w-6 h-6"></i>
                                <span class="text-[10px] font-maitree">บันทึก</span>
                            </button>
                        </div>
                        
                        <!-- Episodes List -->
                        <div class="flex justify-between items-end mb-4">
                            <h3 class="font-bold text-lg font-maitree text-white border-l-2 border-[var(--primary-red)] pl-2">เลือกตอนรับชม</h3>
                            <span class="text-xs text-[var(--gold-accent)] font-maitree">กำลังเล่น: ตอนที่ ${currentEp.ep}</span>
                        </div>
                        <div class="space-y-2 pb-8">
                            ${episodesHTML}
                        </div>

                        <!-- Related -->
                        <h3 class="font-bold text-lg font-maitree text-white mb-4 border-l-2 border-[var(--primary-red)] pl-2">ตำนานที่คล้ายกัน</h3>
                        <div class="grid grid-cols-3 gap-3 pb-10">
                            ${moviesData.filter(m => m.genre === movie.genre && m.id !== movie.id && m.type === 'movie').slice(0, 3).map(m => `
                                <div class="cursor-pointer group" onclick="openPlayer(${m.id})">
                                    <div class="relative rounded-sm overflow-hidden gold-border mb-1">
                                        <img src="${m.poster}" class="w-full aspect-[2/3] object-cover group-hover:scale-110 transition duration-300 opacity-80 group-hover:opacity-100">
                                    </div>
                                    <h4 class="text-[10px] text-[var(--gold-accent)]/80 font-maitree truncate">${m.title}</h4>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
