<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-FLIX: กุนซือ AI & ซีรีส์จีนพรีเมียม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Maitree:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --app-bg: #080303; 
            --primary-red: #c8102e; 
            --gold-accent: #d4af37; 
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at center, #2a0505 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .font-maitree { font-family: 'Maitree', serif; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .text-glow-red { text-shadow: 0 0 15px rgba(200, 16, 46, 0.7); }
        .text-glow-gold { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }

        .chinese-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23d4af37' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
        }

        .bg-flare {
            position: absolute; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(200,16,46,0.2) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none; z-index: 0;
        }

        .tiktok-scroll-container {
            height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }
        .tiktok-video-item {
            height: 100%; width: 100%; scroll-snap-align: start; position: relative;
        }
        .tiktok-video-item video {
            width: 100%; height: 100%; object-fit: cover;
        }

        .nav-btn { color: #6b7280; transition: all 0.3s; }
        .nav-btn.active { color: var(--gold-accent); }
        .cat-btn { transition: all 0.2s; }
        .cat-btn.active { 
            background: linear-gradient(to bottom, var(--primary-red), #800000); 
            color: white; border-color: var(--primary-red); 
            box-shadow: 0 2px 10px rgba(200,16,46,0.4);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        #toast-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            transition: all 0.3s ease; opacity: 0; pointer-events: none;
        }
        #toast-container.show { opacity: 1; transform: translate(-50%, 10px); pointer-events: auto; }
    </style>
</head>
<body>

    <!-- Main App Container -->
    <div id="app-wrapper" class="relative w-full h-[100dvh] md:w-[420px] md:h-[90vh] md:rounded-[2.5rem] bg-[var(--app-bg)] overflow-hidden flex flex-col shadow-[0_0_50px_rgba(200,16,46,0.15)] md:border-[6px] md:border-[#1a0505]">
        
        <div id="toast-container" class="bg-[#1a0505] gold-border text-[var(--gold-accent)] px-4 py-2 rounded-full font-maitree text-sm shadow-xl flex items-center gap-2">
            <i data-lucide="info" class="w-4 h-4"></i>
            <span id="toast-msg">ข้อความ</span>
        </div>

        <div class="chinese-pattern"></div>
        <div class="bg-flare top-0 right-0"></div>
        <div class="bg-flare bottom-1/4 left-0"></div>

        <!-- Header -->
        <header id="main-header" class="absolute top-0 w-full z-50 px-4 py-4 bg-gradient-to-b from-black/90 via-black/60 to-transparent">
            <div class="flex justify-between items-center h-10 mt-1">
                <h1 class="text-3xl font-black font-maitree text-[var(--primary-red)] tracking-widest text-glow-red">ตำนานหอหมื่นลี้</h1>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleSearch()" class="text-[var(--gold-accent)] hover:text-white transition"><i data-lucide="search" class="w-6 h-6"></i></button>
                    <div class="w-8 h-8 rounded-full gold-border overflow-hidden p-0.5">
                        <img src="https://i.pravatar.cc/100" class="w-full h-full rounded-full object-cover">
                    </div>
                </div>
            </div>
            
            <div id="search-container" class="hidden mt-3 fade-in">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="ค้นหาชื่อตำนาน..." class="w-full bg-black/70 gold-border rounded-full py-2 pl-10 pr-4 text-[var(--gold-accent)] placeholder-gray-500 focus:outline-none focus:border-[var(--primary-red)] text-sm font-maitree">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="app-content" class="flex-1 overflow-y-auto hide-scrollbar relative z-10 pb-[70px]"></main>

        <!-- AI Assistant Button -->
        <button id="ai-fab" onclick="toggleAIModal()" class="absolute bottom-[85px] right-4 z-40 w-14 h-14 bg-gradient-to-tr from-[var(--primary-red)] to-[#500000] rounded-full flex items-center justify-center shadow-lg gold-border pulse-glow transition-transform hover:scale-110">
            <i data-lucide="bot" class="w-7 h-7 text-[var(--gold-accent)]"></i>
        </button>

        <!-- AI Assistant Modal -->
        <div id="ai-modal" class="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex-col justify-end">
            <div class="bg-gradient-to-b from-[#1a0505] to-black w-full h-[85%] rounded-t-3xl border-t-2 border-[var(--gold-accent)] flex flex-col shadow-[0_-10px_30px_rgba(200,16,46,0.3)] fade-in">
                
                <div class="flex justify-between items-center px-6 py-4 border-b border-[var(--gold-accent)]/20">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[var(--primary-red)]/20 flex items-center justify-center gold-border">
                            <i data-lucide="sparkles" class="w-5 h-5 text-[var(--gold-accent)]"></i>
                        </div>
                        <div>
                            <h3 class="font-bold font-maitree text-[var(--gold-accent)] text-lg">กุนซือ AI แห่งหอตำรา</h3>
                            <p class="text-[10px] text-gray-400">ข้าค้นหาตำนานและแนะนำให้ท่านได้อัตโนมัติ</p>
                        </div>
                    </div>
                    <button onclick="toggleAIModal()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>

                <div id="ai-chatbox" class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar font-maitree">
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-[var(--primary-red)]/20 shrink-0 flex justify-center items-center gold-border"><i data-lucide="bot" class="w-4 h-4 text-[var(--gold-accent)]"></i></div>
                        <div class="bg-[#2a0808] border border-[var(--gold-accent)]/30 text-gray-200 p-3 rounded-2xl rounded-tl-none text-sm leading-relaxed max-w-[85%]">
                            คารวะนายท่าน! ข้าคือกุนซือประจำหอตำราหมื่นลี้ ท่านอยากรับชมซีรีส์แนวใด หรืออยากให้ข้าค้นหาเรื่องใดในหอตำราแห่งนี้ บอกข้ามาได้เลย...
                        </div>
                    </div>
                </div>

                <div class="p-4 border-t border-[var(--gold-accent)]/20 bg-black">
                    <div class="flex gap-2">
                        <input type="text" id="ai-input" placeholder="บอกความต้องการของท่าน..." class="flex-1 bg-[#1a0505] gold-border rounded-full px-4 py-2 text-[var(--gold-accent)] placeholder-gray-600 text-sm focus:outline-none font-maitree" onkeypress="if(event.key === 'Enter') sendAIMessage()">
                        <button onclick="sendAIMessage()" class="w-10 h-10 rounded-full bg-[var(--primary-red)] flex items-center justify-center text-[var(--gold-accent)] hover:bg-red-800 transition">
                            <i data-lucide="send" class="w-4 h-4 ml-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="absolute bottom-0 w-full h-[70px] bg-gradient-to-t from-[#000] via-[#0a0505]/95 to-transparent z-40 flex justify-around items-center px-2 pb-1 border-t border-[var(--gold-accent)]/20 md:rounded-b-[2rem]">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">หน้าหลัก</span>
            </button>
            <button onclick="switchTab('miniseries')" id="nav-miniseries" class="nav-btn flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="smartphone" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">มินิซีรีส์</span>
            </button>
            <button onclick="switchTab('library')" id="nav-library" class="nav-btn flex flex-col items-center gap-1 w-16 mt-2">
                <i data-lucide="book-open" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium font-maitree">ตำราของฉัน</span>
            </button>
        </nav>

    </div>

    <script>
        const categories = ["ทั้งหมด", "ยุทธภพ", "วังหลวง", "เทพเซียน", "สืบสวน", "โรแมนติก"];
        const sampleVideos = [
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4"
        ];
        const verticalVideos = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4"
        ];

        let moviesData = [];
        let state = {
            tab: 'home', category: 'ทั้งหมด', searchQuery: '', bannerIndex: 0,
            activeMovie: null, activeEpisodeIndex: 0, view: 'main'
        };
        let bannerInterval;

        function generateData() {
            const adjectives = ["ตำนาน", "ลิขิต", "เล่ห์รัก", "กระบี่", "จอมยุทธ", "วิญญาณ", "สวรรค์", "หยาดตะวัน"];
            const nouns = ["วังต้องห้าม", "เย้ยพิภพ", "ผ่าบัลลังก์", "ไร้พ่าย", "ซ่อนพิษ", "ล่าปีศาจ", "หมื่นลี้"];
            const epNames = ["ปฐมบท", "แผนลวง", "รอยแค้น", "คราบน้ำตา", "หักเหลี่ยม"];

            for(let i=1; i<=50; i++) {
                const title = adjectives[i%8] + nouns[(i*3)%7] + (i <= 5 ? " ภาค " + i : "");
                const type = i > 40 ? 'miniseries' : 'movie'; 
                const category = type === 'miniseries' ? 'มินิซีรีส์' : categories[(i % (categories.length - 1)) + 1];
                
                let episodesList = [];
                if(type === 'movie') {
                    const numEps = Math.floor(Math.random() * 3) + 2; 
                    for(let j=0; j<numEps; j++) {
                        episodesList.push({
                            ep: j + 1, title: epNames[j % epNames.length], videoUrl: sampleVideos[j % sampleVideos.length]
                        });
                    }
                } else {
                    episodesList.push({ ep: 1, title: "ตอนที่ 1", videoUrl: verticalVideos[i % verticalVideos.length] });
                }

                moviesData.push({
                    id: i, title: title,
                    description: `ตำนานกล่าวขานถึงเรื่องราวของ ${title} การทรยศหักหลัง ความรักข้ามภพชาติ และการแย่งชิงความเป็นหนึ่ง...`,
                    cover: `https://picsum.photos/seed/${i*15}/800/1200`,
                    poster: `https://picsum.photos/seed/${i*25}/400/600`,
                    rating: (Math.random() * 1.5 + 8.5).toFixed(1),
                    year: 2020 + (i % 5),
                    genre: category, type: type, episodes: episodesList
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateData();
            renderApp();
            startBannerAutoPlay();
            lucide.createIcons();
        });

        function showToast(message) {
            const toast = document.getElementById('toast-container');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function switchTab(tabId) {
            state.tab = tabId; state.view = 'main'; state.searchQuery = '';
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');
            document.getElementById('ai-fab').style.display = 'flex';
            renderApp();
        }

        function setCategory(cat) { state.category = cat; renderApp(); }

        function toggleSearch() {
            const searchContainer = document.getElementById('search-container');
            searchContainer.classList.toggle('hidden');
            if(!searchContainer.classList.contains('hidden')) document.getElementById('search-input').focus();
            else { state.searchQuery = ''; document.getElementById('search-input').value = ''; renderApp(); }
        }

        function handleSearch(query) { state.searchQuery = query.toLowerCase(); renderApp(); }

        function openPlayer(id) {
            state.activeMovie = moviesData.find(m => m.id === id);
            state.activeEpisodeIndex = 0;
            state.view = 'player';
            document.getElementById('ai-fab').style.display = 'none'; 
            renderApp();
        }

        function closePlayer() {
            state.view = 'main';
            state.activeMovie = null;
            document.getElementById('ai-fab').style.display = 'flex';
            renderApp();
        }

        function changeEpisode(index) {
            state.activeEpisodeIndex = index;
            renderApp();
        }

        function startBannerAutoPlay() {
            clearInterval(bannerInterval);
            bannerInterval = setInterval(() => {
                if (state.tab === 'home' && state.view === 'main' && !state.searchQuery) {
                    state.bannerIndex = (state.bannerIndex + 1) % 5;
                    const bannerContainer = document.getElementById('hero-banner-container');
                    if (bannerContainer) { bannerContainer.innerHTML = generateBannerHTML(); lucide.createIcons(); }
                }
            }, 5000);
        }

        // --- ระบบ AI အอโต้ (ไม่ต้องใช้ API Key วุ่นวาย) ---
        const apiKey = ""; 

        function toggleAIModal() {
            const modal = document.getElementById('ai-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            if(!modal.classList.contains('hidden')) document.getElementById('ai-input').focus();
        }

        // ระบบช่วยค้นหาอัจฉริยะ (ทำงานได้ทันทีแม้ไม่มี API Key)
        function localAISearchFallback(text) {
            const keyword = text.toLowerCase();
            const results = moviesData.filter(m => 
                m.title.toLowerCase().includes(keyword) || 
                m.genre.toLowerCase().includes(keyword) ||
                m.description.toLowerCase().includes(keyword)
            ).slice(0, 3);

            if (results.length > 0) {
                let response = `ข้าค้นพบตำนานที่ท่านอาจสนใจตามนี้ขอรับ:<br><br>`;
                results.forEach(m => {
                    response += `<strong class="text-[var(--gold-accent)]">『${m.title}』</strong> - หมวด${m.genre}<br>`;
                });
                response += `<br>โปรดบอกข้าหากท่านต้องการรับชมเรื่องใด`;
                return response;
            } else {
                return `ข้าพลิกตำราดูแล้ว ไม่พบสิ่งที่ตรงกับ "${text}" เลยนายท่าน ลองค้นหาด้วยคำว่า ยุทธภพ, วังหลวง หรือ เทพเซียน ดูเถิด`;
            }
        }

        async function getAIResponse(text) {
            // ถ้าระบบมี API key ผูกมาให้ จะพยายามเรียกใช้ Gemini ก่อน
            if (apiKey) {
                try {
                    const promptText = `
                        คุณคือกุนซือ AI แห่งหอตำราหมื่นลี้ ตอบคำถามสั้นๆ ด้วยภาษาจีนโบราณ
                        หากผู้ใช้ถามหาหนัง ให้ดึงชื่อจากรายชื่อเหล่านี้เท่านั้นเพื่อแนะนำ:
                        ${moviesData.map(m=>m.title).slice(0,10).join(', ')}
                        คำถาม: ${text}
                    `;
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data.candidates[0].content.parts[0].text;
                    }
                } catch (e) {
                    console.log("Gemini API fallback to Local Search");
                }
            }
            
            // หากเรียก API ไม่ได้หรือไม่มี Key ให้ใช้ระบบค้นหาออโต้ในตัวแทน
            await new Promise(r => setTimeout(r, 1000)); // จำลองดีเลย์ให้ดูเหมือน AI กำลังคิด
            return localAISearchFallback(text);
        }

        async function sendAIMessage() {
            const inputEl = document.getElementById('ai-input');
            const text = inputEl.value.trim();
            if(!text) return;
            
            const chatbox = document.getElementById('ai-chatbox');
            
            chatbox.innerHTML += `
                <div class="flex gap-3 justify-end fade-in">
                    <div class="bg-[#3a0b0b] border border-[var(--primary-red)]/50 text-[var(--gold-accent)] p-3 rounded-2xl rounded-tr-none text-sm max-w-[85%]">${text}</div>
                </div>
            `;
            inputEl.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatbox.innerHTML += `
                <div id="${loadingId}" class="flex gap-3 fade-in">
                    <div class="w-8 h-8 rounded-full bg-[var(--primary-red)]/20 shrink-0 flex justify-center items-center gold-border"><i data-lucide="bot" class="w-4 h-4 text-[var(--gold-accent)] animate-pulse"></i></div>
                    <div class="bg-[#2a0808] border border-[var(--gold-accent)]/30 text-gray-400 p-3 rounded-2xl rounded-tl-none text-sm flex items-center gap-1">
                        กำลังเปิดตำราค้นหา <span class="animate-bounce">.</span><span class="animate-bounce" style="animation-delay: 0.1s">.</span><span class="animate-bounce" style="animation-delay: 0.2s">.</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
            chatbox.scrollTop = chatbox.scrollHeight;

            const aiResponse = await getAIResponse(text);
            document.getElementById(loadingId).remove();
            
            chatbox.innerHTML += `
                <div class="flex gap-3 fade-in">
                    <div class="w-8 h-8 rounded-full bg-[var(--primary-red)]/20 shrink-0 flex justify-center items-center gold-border"><i data-lucide="bot" class="w-4 h-4 text-[var(--gold-accent)]"></i></div>
                    <div class="bg-[#2a0808] border border-[var(--gold-accent)]/30 text-gray-200 p-3 rounded-2xl rounded-tl-none text-sm leading-relaxed max-w-[85%]">
                        ${aiResponse.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
            lucide.createIcons();
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // --- Render Views ---
        function renderApp() {
            const content = document.getElementById('app-content');
            const header = document.getElementById('main-header');
            const nav = document.getElementById('bottom-nav');

            if (state.view === 'player') {
                header.style.display = 'none'; nav.style.display = 'none';
                content.innerHTML = generateStandardPlayer();
            } else if (state.tab === 'miniseries') {
                header.style.display = 'none'; nav.style.display = 'flex';
                content.innerHTML = generateMiniSeriesHTML();
                setTimeout(setupTikTokObserver, 100);
            } else {
                header.style.display = 'block'; nav.style.display = 'flex';
                if (state.tab === 'home') content.innerHTML = generateHomeHTML();
                if (state.tab === 'library') content.innerHTML = generateLibraryHTML();
            }
            lucide.createIcons();
            if(state.view !== 'player' && state.tab !== 'miniseries') content.scrollTop = 0;
        }

        function generateBannerHTML() {
            const hero = moviesData[state.bannerIndex];
            return `
                <div class="relative w-full h-[70vh] md:h-[60vh] fade-in border-b-2 border-[var(--gold-accent)]/30" id="hero-banner">
                    <img src="${hero.cover}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-[var(--app-bg)] via-[var(--app-bg)]/40 to-transparent"></div>
                    
                    <div class="absolute bottom-0 w-full px-5 pb-8 flex flex-col items-center text-center">
                        <span class="text-[var(--gold-accent)] border border-[var(--gold-accent)]/50 px-3 py-1 rounded-sm text-[10px] font-bold tracking-widest mb-3 bg-black/30 backdrop-blur-sm font-maitree">ยอดนิยมอันดับ ${state.bannerIndex + 1}</span>
                        <h2 class="text-4xl font-bold font-maitree text-white text-glow-gold mb-2 leading-tight">${hero.title}</h2>
                        <div class="flex gap-4 w-full max-w-[280px] mt-4">
                            <button onclick="openPlayer(${hero.id})" class="flex-1 bg-gradient-to-r from-[var(--primary-red)] to-[#800000] text-white py-3 rounded-full font-bold text-sm flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(200,16,46,0.6)] font-maitree border border-red-500/50 hover:scale-105 transition-transform">
                                <i data-lucide="play" class="fill-current w-4 h-4 text-[var(--gold-accent)]"></i> รับชมตำนาน
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function generateHomeHTML() {
            let filteredMovies = moviesData.filter(m => m.type === 'movie');
            if (state.searchQuery) filteredMovies = filteredMovies.filter(m => m.title.toLowerCase().includes(state.searchQuery));
            else if (state.category !== 'ทั้งหมด') filteredMovies = filteredMovies.filter(m => m.genre === state.category);

            let html = '';
            if (!state.searchQuery && state.category === 'ทั้งหมด') html += `<div id="hero-banner-container">${generateBannerHTML()}</div>`;
            else html += `<div class="h-24"></div>`;

            html += `
                <div class="px-4 py-3 sticky top-0 z-30 bg-[#0a0505]/95 backdrop-blur-md border-b border-[var(--gold-accent)]/20 shadow-lg">
                    <div class="flex gap-3 overflow-x-auto hide-scrollbar">
            `;
            categories.forEach(cat => {
                const isActive = state.category === cat;
                html += `<button onclick="setCategory('${cat}')" class="cat-btn px-4 py-1.5 rounded-full border border-[var(--gold-accent)]/30 text-xs font-maitree whitespace-nowrap tracking-wide ${isActive ? 'active' : 'text-[var(--gold-accent)] hover:bg-white/5'}">${cat}</button>`;
            });
            html += `</div></div><div class="px-4 py-6 fade-in">`;
            
            if (state.searchQuery) html += `<h3 class="font-maitree text-gray-400 mb-4 text-sm">ม้วนคัมภีร์ที่ค้นพบ: <span class="text-[var(--gold-accent)]">"${state.searchQuery}"</span></h3>`;
            else {
                const headText = state.category === 'ทั้งหมด' ? 'ยอดตำนานมาใหม่' : `หมวด: ${state.category}`;
                html += `<h3 class="text-xl font-bold font-maitree text-[var(--gold-accent)] mb-4 border-l-2 border-[var(--primary-red)] pl-3 text-glow-gold">${headText}</h3>`;
            }

            if (filteredMovies.length === 0) html += `<div class="text-center py-10 font-maitree text-gray-500">ไม่พบตำนานที่ท่านค้นหา</div>`;
            else {
                html += `<div class="grid grid-cols-3 gap-3">`;
                filteredMovies.forEach(movie => {
                    html += `
                        <div class="flex flex-col cursor-pointer group" onclick="openPlayer(${movie.id})">
                            <div class="relative w-full aspect-[2/3] rounded-sm overflow-hidden mb-2 gold-border shadow-md">
                                <img src="${movie.poster}" loading="lazy" class="w-full h-full object-cover opacity-90 transition-all duration-500 group-hover:scale-110 group-hover:opacity-100">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                <div class="absolute inset-0 bg-[var(--primary-red)]/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                    <i data-lucide="play-circle" class="w-8 h-8 text-[var(--gold-accent)]"></i>
                                </div>
                            </div>
                            <h4 class="text-sm font-semibold font-maitree text-gray-200 truncate group-hover:text-[var(--gold-accent)] transition-colors">${movie.title}</h4>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        }

        function generateStandardPlayer() {
            const movie = state.activeMovie;
            const currentEp = movie.episodes[state.activeEpisodeIndex];

            let episodesHTML = '';
            movie.episodes.forEach((ep, idx) => {
                const isActive = idx === state.activeEpisodeIndex;
                episodesHTML += `
                    <div onclick="changeEpisode(${idx})" class="flex items-center gap-4 p-3 rounded-md cursor-pointer transition-all ${isActive ? 'bg-[var(--primary-red)]/20 border border-[var(--primary-red)]/50' : 'bg-black/40 hover:bg-white/5 border border-[var(--gold-accent)]/10'}">
                        <div class="w-12 h-8 rounded flex justify-center items-center shrink-0 ${isActive ? 'bg-[var(--primary-red)] text-[var(--gold-accent)]' : 'bg-black text-gray-500 border border-[var(--gold-accent)]/20'} font-bold font-maitree text-sm">EP ${ep.ep}</div>
                        <div class="flex-1"><h4 class="font-semibold text-sm font-maitree ${isActive ? 'text-[var(--gold-accent)]' : 'text-gray-300'}">${ep.title}</h4></div>
                        ${isActive ? '<i data-lucide="play-circle" class="w-5 h-5 text-[var(--primary-red)] animate-pulse"></i>' : '<i data-lucide="lock" class="w-4 h-4 text-gray-600"></i>'}
                    </div>
                `;
            });

            return `
                <div class="w-full h-full flex flex-col bg-[var(--app-bg)] fade-in">
                    <!-- ลบปุ่มขยายแบบ Custom ออก และให้ระบบใช้วิดีโอคอนโทรลแบบเต็มแทน -->
                    <div id="video-wrapper" class="relative w-full aspect-video bg-black sticky top-0 z-50 border-b border-[var(--gold-accent)]/30 md:rounded-t-[2rem] overflow-hidden group">
                        <div class="absolute top-0 left-0 w-full p-4 flex justify-between z-50 bg-gradient-to-b from-black/80 to-transparent opacity-100 group-hover:opacity-100 transition-opacity pointer-events-none">
                            <button onclick="closePlayer()" class="w-10 h-10 bg-black/60 rounded-full flex items-center justify-center text-[var(--gold-accent)] hover:bg-[var(--primary-red)] transition backdrop-blur-md border border-[var(--gold-accent)]/30 pointer-events-auto">
                                <i data-lucide="chevron-left" class="w-6 h-6"></i>
                            </button>
                        </div>

                        <!-- controls จะแสดงปุ่มขยาย/ลด แบบปกติของ Browser มุมขวาล่าง -->
                        <video id="main-video" controls autoplay playsinline webkit-playsinline poster="${movie.cover}" class="w-full h-full outline-none object-contain">
                            <source src="${currentEp.videoUrl}" type="video/mp4">
                        </video>
                    </div>

                    <div class="flex-1 overflow-y-auto px-4 py-5 hide-scrollbar">
                        <h1 class="text-3xl font-bold font-maitree text-[var(--gold-accent)] mb-2 text-glow-gold">${movie.title}</h1>
                        
                        <div class="flex items-center gap-3 text-xs text-gray-400 mb-4 font-maitree">
                            <span class="text-[var(--primary-red)] border border-[var(--primary-red)] px-1.5 rounded-sm">เรตติ้ง ${movie.rating}</span>
                            <span class="text-[var(--gold-accent)]">•</span><span>${movie.year}</span>
                            <span class="text-[var(--gold-accent)]">•</span><span>${movie.genre}</span>
                        </div>

                        <p class="text-sm text-gray-300 mb-6 leading-relaxed opacity-90">${movie.description}</p>

                        <div class="flex justify-around mb-8 border-y border-[var(--gold-accent)]/20 py-4">
                            <button onclick="showToast('เก็บเข้าหอตำราเรียบร้อย')" class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] hover:-translate-y-1 transition-transform">
                                <i data-lucide="bookmark-plus" class="w-6 h-6"></i><span class="text-[10px] font-maitree">เก็บเข้าหอตำรา</span>
                            </button>
                            <button onclick="showToast('คัดลอกลิงก์ตำนานแล้ว')" class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] hover:-translate-y-1 transition-transform">
                                <i data-lucide="share-2" class="w-6 h-6"></i><span class="text-[10px] font-maitree">ส่งมอบ</span>
                            </button>
                            <button onclick="showToast('กำลังคัดลอกม้วนคัมภีร์ลงอุปกรณ์...')" class="flex flex-col items-center gap-2 text-[var(--gold-accent)]/70 hover:text-[var(--gold-accent)] hover:-translate-y-1 transition-transform">
                                <i data-lucide="download" class="w-6 h-6"></i><span class="text-[10px] font-maitree">บันทึก</span>
                            </button>
                        </div>
                        
                        <div class="flex justify-between items-end mb-4">
                            <h3 class="font-bold text-lg font-maitree text-white border-l-2 border-[var(--primary-red)] pl-2">เลือกตอนรับชม</h3>
                            <span class="text-xs text-[var(--gold-accent)] font-maitree">กำลังเล่น: ตอนที่ ${currentEp.ep}</span>
                        </div>
                        <div class="space-y-2 pb-8">${episodesHTML}</div>
                    </div>
                </div>
            `;
        }

        function generateMiniSeriesHTML() {
            const miniseries = moviesData.filter(m => m.type === 'miniseries');
            let html = `<div class="tiktok-scroll-container fade-in" id="tiktok-container">`;
            miniseries.forEach((movie) => {
                html += `
                    <div class="tiktok-video-item">
                        <video src="${movie.episodes[0].videoUrl}" poster="${movie.cover}" loop muted playsinline webkit-playsinline class="object-cover"></video>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/10 to-transparent pointer-events-none"></div>
                        <div class="absolute top-12 left-0 w-full flex justify-center z-20 pointer-events-none">
                            <span class="text-[var(--gold-accent)] font-maitree text-lg font-bold text-glow-gold tracking-widest opacity-80">มินิซีรีส์</span>
                        </div>
                        <div class="absolute right-4 bottom-28 flex flex-col items-center gap-6 z-20">
                            <div onclick="showToast('ส่งต่อมินิซีรีส์นี้แล้ว')" class="flex flex-col items-center group cursor-pointer">
                                <div class="w-12 h-12 bg-black/50 border border-[var(--gold-accent)]/30 rounded-full flex items-center justify-center backdrop-blur-md group-hover:bg-[var(--primary-red)]/80 transition hover:scale-110">
                                    <i data-lucide="share-2" class="w-5 h-5 text-[var(--gold-accent)]"></i>
                                </div>
                            </div>
                            <div class="flex flex-col items-center cursor-pointer mt-2 hover:scale-110 transition-transform" onclick="toggleMute(this)">
                                <div class="w-12 h-12 bg-black/50 border border-[var(--gold-accent)]/30 rounded-full flex items-center justify-center backdrop-blur-md transition sound-btn-bg">
                                    <i data-lucide="volume-x" class="w-5 h-5 text-gray-400 mute-icon"></i>
                                </div>
                            </div>
                        </div>
                        <div class="absolute bottom-20 left-5 right-20 z-20">
                            <span class="bg-[var(--primary-red)] text-white px-2 py-0.5 rounded text-[10px] font-bold mb-2 inline-block font-maitree border border-red-400">Exclusive</span>
                            <h2 class="text-2xl font-bold font-maitree text-[var(--gold-accent)] mb-1 text-glow-gold">${movie.title}</h2>
                            <p class="text-sm text-gray-300 line-clamp-2 font-prompt opacity-90 leading-relaxed">${movie.description}</p>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        function setupTikTokObserver() {
            const container = document.getElementById('tiktok-container');
            if(!container) return;
            const videos = container.querySelectorAll('.tiktok-video-item video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) video.play().catch(e => console.log("Auto-play prevented", e));
                    else { video.pause(); video.currentTime = 0; }
                });
            }, { threshold: 0.6 });

            videos.forEach(video => {
                observer.observe(video);
                video.addEventListener('click', () => { if (video.paused) video.play(); else video.pause(); });
            });
        }

        function toggleMute(btnElement) {
            const container = btnElement.closest('.tiktok-video-item');
            const video = container.querySelector('video');
            const icon = btnElement.querySelector('.mute-icon');
            const bg = btnElement.querySelector('.sound-btn-bg');

            if (video.muted) {
                video.muted = false;
                icon.setAttribute('data-lucide', 'volume-2');
                icon.classList.replace('text-gray-400', 'text-[var(--gold-accent)]');
                bg.classList.replace('bg-black/50', 'bg-[var(--primary-red)]/80');
                showToast("เปิดเสียงแล้ว");
            } else {
                video.muted = true;
                icon.setAttribute('data-lucide', 'volume-x');
                icon.classList.replace('text-[var(--gold-accent)]', 'text-gray-400');
                bg.classList.replace('bg-[var(--primary-red)]/80', 'bg-black/50');
            }
            lucide.createIcons();
        }

        function generateLibraryHTML() {
            return `
                <div class="pt-20 px-4 h-full flex flex-col items-center justify-center text-center pb-20 font-maitree fade-in">
                    <div class="w-20 h-20 rounded-full border-2 border-[var(--gold-accent)]/50 flex items-center justify-center mb-6 bg-black/50 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                        <i data-lucide="book" class="w-10 h-10 text-[var(--gold-accent)]"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-[var(--gold-accent)] mb-2 text-glow-gold">หอตำราลับ</h2>
                    <p class="text-sm text-gray-400 mb-8 font-prompt">ท่านยังไม่ได้เก็บรวบรวมม้วนคัมภีร์ใดๆ ไว้ในหอตำรา</p>
                    <button onclick="switchTab('home')" class="border border-[var(--primary-red)] text-[var(--primary-red)] px-8 py-2.5 rounded-sm font-bold text-sm hover:bg-[var(--primary-red)] hover:text-[var(--gold-accent)] transition-all hover:scale-105 shadow-lg">
                        ค้นหาตำนาน
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
