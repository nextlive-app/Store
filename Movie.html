<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำนักเทพเซียน - ดินแดนแห่งซีรีส์และตำราเทพนิยาย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Maitree:wght@300;400;600;700&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- HLS.js for m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            /* Theme 1: Heavenly Blue (Home & Novels) */
            --bg-blue-dark: #0a1128;
            --bg-blue-light: #1c2e4a;
            --text-blue-primary: #e0f2fe;
            --accent-blue: #7dd3fc;
            --border-silver: #cbd5e1;

            /* Theme 2: Royal Red (Movie Detail) */
            --bg-red-dark: #2a0808;
            --bg-red-light: #4a0d0d;
            --text-red-primary: #fef08a;
            --accent-gold: #fbbf24;
            --border-gold: #d97706;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-blue-dark);
            color: var(--text-blue-primary);
            transition: all 0.5s ease;
            overflow-x: hidden;
            padding-bottom: 70px; /* Space for bottom nav */
        }

        h1, h2, h3, .font-serif-thai {
            font-family: 'Maitree', serif;
        }

        /* --- Theme Classes --- */
        .theme-heaven {
            background: radial-gradient(circle at top, var(--bg-blue-light) 0%, var(--bg-blue-dark) 80%);
            color: var(--text-blue-primary);
        }
        .theme-heaven .glass-panel {
            background: rgba(28, 46, 74, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .theme-heaven .text-accent { color: var(--accent-blue); }
        .theme-heaven .border-accent { border-color: var(--accent-blue); }
        .theme-heaven .nav-active { color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }

        .theme-mortal {
            background: radial-gradient(circle at top, var(--bg-red-light) 0%, var(--bg-red-dark) 80%);
            color: var(--text-red-primary);
        }
        .theme-mortal .glass-panel {
            background: rgba(74, 13, 13, 0.6);
            border: 1px solid rgba(217, 119, 6, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }
        .theme-mortal .text-accent { color: var(--accent-gold); }
        .theme-mortal .border-accent { border-color: var(--accent-gold); }
        .theme-mortal .nav-active { color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold); }


        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* --- Horizontal Scroller --- */
        .movie-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1rem;
            padding-bottom: 1rem;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .movie-row::-webkit-scrollbar { display: none; }
        
        .movie-card {
            flex: 0 0 calc(50% - 0.5rem); 
            scroll-snap-align: start;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border-radius: 0.5rem;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @media (min-width: 768px) {
            .movie-card { flex: 0 0 200px; }
            .auto-scroll-container { overflow: hidden; white-space: nowrap; }
            .auto-scroll-content { display: inline-flex; animation: scrollX 40s linear infinite; }
            .auto-scroll-content:hover { animation-play-state: paused; }
            @keyframes scrollX { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        }

        .movie-card:hover { transform: translateY(-5px) scale(1.02); z-index: 10; }

        .movie-poster-container {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-bottom: 2px solid transparent;
        }
        
        .theme-heaven .movie-poster { border-bottom-color: var(--accent-blue); }
        .theme-mortal .movie-poster { border-bottom-color: var(--accent-gold); }

        /* --- AI Chat --- */
        #ai-chat-modal { backdrop-filter: blur(5px); }
        .chat-bubble-ai {
            background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(50,50,50,0.9));
            border-left: 3px solid var(--accent-gold);
            border-radius: 10px 10px 10px 0;
        }
        .chat-bubble-user {
            background: rgba(255,255,255,0.1);
            border-right: 3px solid var(--accent-blue);
            border-radius: 10px 10px 0 10px;
            text-align: right;
        }

        /* --- Video Player Wrapper --- */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 0.5rem;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .mystic-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            pointer-events: none;
        }

        /* --- Novel Reader Styles --- */
        .novel-reader-bg {
            background-color: #0f172a;
            color: #e2e8f0;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        .novel-content {
            font-family: 'Maitree', serif;
            line-height: 2;
            font-size: 1.125rem;
            text-indent: 2rem;
            white-space: pre-line;
        }
        .novel-content p {
            margin-bottom: 1.5rem;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="theme-heaven" id="app-body">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-40 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
            <i class="fa-solid fa-yin-yang text-3xl text-accent animate-spin-slow" style="animation: spin 10s linear infinite;"></i>
            <h1 class="text-2xl font-bold tracking-wider font-serif-thai text-accent text-shadow-glow">
                สำนักเทพเซียน
            </h1>
        </div>
        <div class="text-sm opacity-80" id="header-subtitle">
            <i class="fa-solid fa-cloud"></i> ดินแดนศักดิ์สิทธิ์
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="p-4 min-h-screen"></main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full glass-panel flex justify-around items-center p-3 z-40 border-t border-accent rounded-t-2xl">
        <button onclick="navigate('home')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-home">
            <i class="fa-solid fa-film text-xl"></i>
            <span class="text-xs">ซีรีส์/ภาพยนตร์</span>
        </button>
        <button onclick="navigate('history')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-history">
            <i class="fa-solid fa-history text-xl"></i>
            <span class="text-xs">ดูต่อ</span>
        </button>
        <button onclick="navigate('novels')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-novels">
            <i class="fa-solid fa-book-open text-xl"></i>
            <span class="text-xs">หอตำรา (นิยาย)</span>
        </button>
    </nav>

    <!-- AI Grandmaster Button -->
    <button onclick="toggleAIChat()" class="fixed bottom-20 right-4 z-50 w-14 h-14 rounded-full bg-gradient-to-r from-yellow-600 to-yellow-400 flex items-center justify-center shadow-[0_0_15px_rgba(251,191,36,0.6)] hover:scale-110 transition-transform">
        <i class="fa-solid fa-user-tie text-2xl text-black"></i>
    </button>

    <!-- AI Chat Modal -->
    <div id="ai-chat-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end p-4">
        <div class="glass-panel w-full max-w-lg mx-auto rounded-t-2xl overflow-hidden flex flex-col h-[80vh] border-t-2 border-x-2 border-accent-gold">
            <div class="p-4 bg-gradient-to-b from-black to-transparent flex justify-between items-center border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center text-black">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <h3 class="font-serif-thai font-bold text-yellow-500">บรรพจารย์รู้แจ้ง</h3>
                        <p class="text-xs text-gray-300">ปรมาจารย์แห่งหอตำรา</p>
                    </div>
                </div>
                <button onclick="toggleAIChat()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col font-serif-thai">
                <div class="chat-bubble-ai p-3 self-start max-w-[80%] text-sm text-yellow-100 shadow-md">
                    คารวะศิษย์น้อง เจ้าต้องการให้ข้าค้นหาคัมภีร์เรื่องใด หรืออยากให้ข้าแนะนำเรื่องไหนให้ บอกมาได้เลย...
                </div>
            </div>

            <div class="p-3 border-t border-gray-700 bg-black/50 flex gap-2 items-center">
                <button id="voice-btn" onclick="toggleVoice()" class="p-2 text-yellow-500 hover:text-yellow-300 transition-colors">
                    <i class="fa-solid fa-volume-high" id="voice-icon"></i>
                </button>
                <input type="text" id="chat-input" placeholder="พิมพ์ชื่อหนัง, นิยาย หรือแนวที่ชอบ..." class="flex-1 bg-gray-900 border border-gray-700 rounded-full px-4 py-2 text-sm text-white focus:outline-none focus:border-yellow-500" onkeypress="handleChatEnter(event)">
                <button onclick="sendChatMessage()" class="w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center text-black hover:bg-yellow-500">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. System Configuration & API ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx8Zw7yc9QlPrU9PeaJ6koVbk9UqAZhRIDUSxKvqhQnyc5sp27V0rkxb5FbNKivIfhi/exec";
        let movies = []; 
        let novels = []; 

        // --- 2. State Management ---
        let state = {
            view: 'home',
            currentMovieId: null,
            currentNovelId: null,
            history: [],
            voiceEnabled: true
        };

        // --- 3. Mock Data Generator for Novels (Fallback if API doesn't have it yet) ---
        function generateMockNovels() {
            const covers = [
                "https://images.unsplash.com/photo-1544640808-32cb4cd733d0?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&h=750&q=80",
                "https://images.unsplash.com/photo-1614161173200-334346ed8c88?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&h=750&q=80",
                "https://images.unsplash.com/photo-1512820790803-83ca734da794?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&h=750&q=80"
            ];
            let mock = [];
            for(let i=1; i<=15; i++) {
                let chapters = [];
                for(let j=1; j<=10; j++) {
                    chapters.push({
                        ep: j,
                        title: `ตอนที่ ${j}: จุดเริ่มต้นของโชคชะตา`,
                        content: `ลมหนาวพัดโชยมาปะทะใบหน้า ชายหนุ่มยืนตระหง่านอยู่บนยอดเขา ทอดสายตามองลงไปยังเบื้องล่างที่ปกคลุมไปด้วยเมฆหมอก ดาบในมือของเขาสั่นไหวเบาๆ ราวกับรับรู้ได้ถึงจิตสังหารที่กำลังคืบคลานเข้ามา\n\n"ในที่สุด... เวลานี้ก็มาถึง" เขารำพึงกับตัวเองเบาๆ ก่อนจะพุ่งทะยานลงจากยอดเขาดั่งวิหคสวรรค์ พลังปราณอันแข็งแกร่งระเบิดออกมารอบทิศทาง ทำลายต้นไม้และโขดหินจนแหลกเป็นจุณ\n\nนี่คือการต่อสู้ที่จะตัดสินชะตากรรมของสามภพ...`
                    });
                }
                mock.push({
                    id: `N${i}`,
                    title: `คัมภีร์ลับเทพมาร เล่มที่ ${i}`,
                    cover: covers[i % covers.length],
                    description: `เรื่องราวการผจญภัยของเด็กหนุ่มผู้ครอบครองสายเลือดเทพและมารในร่างเดียว เขาต้องเผชิญกับอุปสรรคมากมายเพื่อก้าวขึ้นสู่จุดสูงสุดแห่งยุทธภพ`,
                    totalChapters: 10,
                    episodes: chapters
                });
            }
            return mock;
        }

        // --- 4. Data Fetching ---
        const mainContent = document.getElementById('main-content');
        const body = document.getElementById('app-body');

        async function fetchDataFromAPI() {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-[60vh] text-accent">
                    <i class="fa-solid fa-yin-yang fa-spin text-5xl mb-4"></i>
                    <h2 class="font-serif-thai text-xl animate-pulse">กำลังปลดผนึกหอตำรา...</h2>
                </div>`;
            
            try {
                // Fetch Movies
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getMoviesData' })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    movies = data.movies.map((m, idx) => {
                        let vidUrl = m.episodes && m.episodes.length > 0 ? m.episodes[0].url : '';
                        let vidType = 'mp4';
                        
                        // Detect video type
                        if(vidUrl.includes('drive.google.com')) vidType = 'drive';
                        else if(vidUrl.includes('dropbox.com')) vidType = 'dropbox';
                        else if(vidUrl.includes('m3u8')) vidType = 'm3u8';
                        else if(vidUrl.includes('youtube') || vidUrl.includes('youtu.be')) vidType = 'youtube';

                        return {
                            id: m.id || String(idx),
                            title: m.title || 'เรื่องไร้นาม',
                            category: m.category || 'ภาพยนตร์/ซีรีส์',
                            description: m.desc || 'ไม่มีบันทึกกล่าวถึงคัมภีร์เล่มนี้...',
                            cover: m.cover || m.poster || 'https://via.placeholder.com/500x750/1c2e4a/7dd3fc?text=No+Cover',
                            episodes: m.episodes ? m.episodes.length : 1,
                            rating: (Math.random() * 2 + 8).toFixed(1),
                            video: { type: vidType, url: vidUrl },
                            rawEpisodes: m.episodes || [] 
                        };
                    });

                    // Fetch Novels (If backend has it, otherwise use Mock)
                    // (สมมติว่าถ้าส่ง action getNovelsData ไปแล้วไม่มี จะ catch error มาใช้ Mock)
                    try {
                        const novRes = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getNovelsData' }) });
                        const novData = await novRes.json();
                        if(novData.status === 'success' && novData.novels.length > 0) {
                            novels = novData.novels;
                        } else { novels = generateMockNovels(); }
                    } catch(e) { novels = generateMockNovels(); }

                    navigate('home');
                } else {
                    mainContent.innerHTML = `<div class="text-center mt-20 text-red-400 font-serif-thai">ไม่สามารถทะลวงค่ายกลได้: ${data.message}</div>`;
                }
            } catch (error) {
                mainContent.innerHTML = `<div class="text-center mt-20 text-red-400 font-serif-thai">เกิดเหตุขัดข้อง ไม่สามารถเชื่อมต่อกับโลกภายนอกได้</div>`;
                // For demonstration, if totally offline, load mock data anyway
                novels = generateMockNovels();
            }
        }

        function updateNavState() {
            ['home', 'history', 'novels'].forEach(nav => {
                document.getElementById(`nav-${nav}`).classList.remove('nav-active', 'text-white');
                if (state.view === nav || (state.view === 'movie' && nav === 'home') || (state.view === 'novel_detail' && nav === 'novels') || (state.view === 'novel_reader' && nav === 'novels')) {
                    document.getElementById(`nav-${nav}`).classList.add('nav-active', 'text-white');
                }
            });
            
            const subtitle = document.getElementById('header-subtitle');
            if(state.view.includes('novel')) subtitle.innerHTML = '<i class="fa-solid fa-book"></i> หอตำราหลวง';
            else subtitle.innerHTML = '<i class="fa-solid fa-cloud"></i> ดินแดนศักดิ์สิทธิ์';
        }

        function navigate(view, data = null, extraData = null) {
            if(movies.length === 0 && view !== 'home') return; 

            state.view = view;
            updateNavState();
            window.scrollTo(0, 0);

            if (view === 'home') {
                body.className = 'theme-heaven';
                renderHome();
            } else if (view === 'movie') {
                body.className = 'theme-mortal';
                state.currentMovieId = data;
                addToHistory('M' + data);
                renderMovie(data);
            } else if (view === 'novels') {
                body.className = 'theme-heaven';
                renderNovelsList();
            } else if (view === 'novel_detail') {
                body.className = 'theme-heaven';
                state.currentNovelId = data;
                addToHistory('N' + data);
                renderNovelDetail(data);
            } else if (view === 'novel_reader') {
                body.className = 'theme-mortal'; // Darker theme for reading
                renderNovelReader(data, extraData); // data = novelId, extraData = chapterIndex
            } else if (view === 'history') {
                body.className = 'theme-heaven';
                renderHistory();
            }
        }

        // --- 5. Video Player Helpers ---
        function getPlayerHtml(url, type) {
            if (type === 'drive' || url.includes('drive.google.com')) {
                // Convert to Preview URL
                let driveId = "";
                let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if(match) driveId = match[1];
                else {
                    match = url.match(/id=([a-zA-Z0-9_-]+)/);
                    if(match) driveId = match[1];
                }
                
                if(driveId) {
                    return `<iframe src="https://drive.google.com/file/d/${driveId}/preview" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="w-full h-full absolute top-0 left-0"></iframe>`;
                }
                return `<div class="text-red-500 text-center pt-20">Drive Link ไม่ถูกต้อง</div>`;
            } 
            else if (type === 'dropbox' || url.includes('dropbox.com')) {
                // Change dl=0 to raw=1
                let rawUrl = url.replace(/(dl=0|dl=1)/, 'raw=1');
                return `<video src="${rawUrl}" controls autoplay class="w-full h-full absolute top-0 left-0"></video>`;
            } 
            else if (type === 'youtube') {
                let yId = url;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                if (match && match[2].length === 11) yId = match[2];
                return `<iframe src="https://www.youtube.com/embed/${yId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen class="w-full h-full absolute top-0 left-0"></iframe>`;
            } 
            else if (type === 'm3u8') {
                return `<video id="video-player" controls autoplay class="w-full h-full absolute top-0 left-0"></video>`;
            } 
            else {
                return `<video src="${url}" controls autoplay class="w-full h-full absolute top-0 left-0"></video>`;
            }
        }

        window.playEpisode = function(url, type) {
            const container = document.getElementById('player-container-box');
            if(!container) return;
            
            container.innerHTML = getPlayerHtml(url, type);

            // Handle HLS specifically
            if (type === 'm3u8') {
                const video = document.getElementById('video-player');
                if (Hls.isSupported() && video) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                } else if (video && video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play();
                }
            }
        }


        // --- 6. View Implementations ---
        function renderHome() {
            if(movies.length === 0) return;

            let html = `<div class="mb-6">
                <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai text-shadow-glow">ภาพยนตร์ / ซีรีส์</h2>
                <p class="text-sm opacity-80">เรื่องราวภาพเคลื่อนไหวแห่งสามภพ</p>
            </div>`;

            const categories = [...new Set(movies.map(m => m.category))];

            categories.forEach((cat, index) => {
                const catMovies = movies.filter(m => m.category === cat);
                if(catMovies.length === 0) return;
                
                const isDesktop = window.innerWidth >= 768;
                let rowWrapperClass = "movie-row";
                let contentClass = "";
                
                if(isDesktop && index === 0) {
                     rowWrapperClass = "auto-scroll-container";
                     contentClass = "auto-scroll-content";
                }

                html += `
                    <div class="mb-8">
                        <div class="flex items-center gap-2 mb-4">
                            <i class="fa-solid fa-film text-accent"></i>
                            <h3 class="text-xl font-bold font-serif-thai">${cat}</h3>
                        </div>
                        <div class="${rowWrapperClass}">
                            <div class="${contentClass} flex gap-4 w-full">
                                ${catMovies.map(movie => `
                                    <div class="movie-card glass-panel flex-shrink-0" onclick="navigate('movie', '${movie.id}')">
                                        <div class="movie-poster-container">
                                            <img src="${movie.cover}" class="movie-poster" alt="${movie.title}">
                                            <div class="mystic-overlay flex items-end p-2 pb-3">
                                                <span class="text-xs font-bold bg-blue-900/90 px-2 py-1 rounded text-white border border-blue-400 shadow-lg">
                                                    <i class="fa-solid fa-play mr-1"></i> ${movie.episodes} ตอน
                                                </span>
                                            </div>
                                        </div>
                                        <div class="p-3 text-center h-[3.5rem] flex items-center justify-center bg-black/20">
                                            <h4 class="font-bold text-sm line-clamp-2 font-serif-thai text-blue-100">${movie.title}</h4>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            mainContent.innerHTML = html;
        }

        function renderMovie(id) {
            const movie = movies.find(m => m.id === String(id));
            if (!movie) return;

            // Generate initial player HTML
            let initialUrl = movie.video.url;
            let initialType = movie.video.type;
            
            // Generate episode buttons 
            let epsHtml = '';
            if(movie.rawEpisodes && movie.rawEpisodes.length > 0) {
                movie.rawEpisodes.forEach((ep, index) => {
                    let epType = 'mp4';
                    let epUrl = ep.url;
                    if(epUrl.includes('drive.google')) epType = 'drive';
                    else if(epUrl.includes('dropbox')) epType = 'dropbox';
                    else if(epUrl.includes('m3u8')) epType = 'm3u8';
                    else if(epUrl.includes('youtube') || epUrl.includes('youtu.be')) epType = 'youtube';
                    
                    epsHtml += `<button onclick="playEpisode('${epUrl}', '${epType}')" class="px-2 py-2 glass-panel rounded hover:bg-yellow-900 hover:text-white transition-colors border-accent text-sm whitespace-nowrap text-ellipsis overflow-hidden">${ep.title || 'ตอนที่ ' + (index+1)}</button>`;
                });
            } else {
                epsHtml = `<span class="text-sm text-gray-400">ไม่มีแยกตอนย่อย</span>`;
            }

            let html = `
                <div class="animate-fade-in">
                    <button onclick="navigate('home')" class="mb-4 text-gray-400 hover:text-accent transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> กลับสู่หน้าภาพยนตร์
                    </button>

                    <div class="video-container mb-6 shadow-glow-red" id="player-container-box">
                        ${getPlayerHtml(initialUrl, initialType)}
                    </div>

                    <div class="glass-panel p-5 rounded-xl mb-6 border-accent">
                        <h2 class="text-2xl md:text-3xl font-bold font-serif-thai text-accent text-shadow-glow mb-2">${movie.title}</h2>
                        <div class="flex flex-wrap gap-2 text-xs mb-4 text-gray-300">
                            <span class="bg-red-900/80 px-2 py-1 rounded">หมวด: ${movie.category.split(' ')[0]}</span>
                            <span class="bg-red-900/80 px-2 py-1 rounded"><i class="fa-solid fa-star text-yellow-400"></i> ${movie.rating}</span>
                        </div>
                        <p class="text-sm leading-relaxed text-gray-200 font-serif-thai border-l-2 border-accent pl-3 whitespace-pre-wrap">
                            ${movie.description}
                        </p>
                    </div>

                    <div class="pb-8">
                        <h3 class="text-xl font-bold mb-4 font-serif-thai text-accent flex items-center gap-2">
                            <i class="fa-solid fa-list"></i> เลือกตอนรับชม
                        </h3>
                        <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-2">
                            ${epsHtml}
                        </div>
                    </div>
                </div>
            `;

            mainContent.innerHTML = html;

            // Handle initial HLS if needed
            if (initialType === 'm3u8') {
                const video = document.getElementById('video-player');
                if (Hls.isSupported() && video) {
                    const hls = new Hls();
                    hls.loadSource(initialUrl);
                    hls.attachMedia(video);
                }
            }
        }

        // --- 7. Novel Implementations (หอตำรา) ---
        function renderNovelsList() {
            let html = `
                <div class="mb-6">
                    <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai text-shadow-glow">หอตำราหลวง</h2>
                    <p class="text-sm opacity-80">บันทึกตัวอักษร ร้อยเรียงจินตนาการ</p>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 pb-8">
            `;

            novels.forEach(novel => {
                html += `
                    <div class="movie-card glass-panel" onclick="navigate('novel_detail', '${novel.id}')">
                        <div class="movie-poster-container">
                            <img src="${novel.cover}" class="movie-poster" alt="${novel.title}">
                            <div class="mystic-overlay flex items-end p-2 pb-3">
                                <span class="text-xs font-bold bg-purple-900/90 px-2 py-1 rounded text-white border border-purple-400 shadow-lg flex items-center gap-1">
                                    <i class="fa-solid fa-book-open"></i> ${novel.totalChapters} ตอน
                                </span>
                            </div>
                        </div>
                        <div class="p-3 text-center h-[3.5rem] flex items-center justify-center bg-black/20 border-t border-accent">
                            <h4 class="font-bold text-sm line-clamp-2 font-serif-thai text-blue-100">${novel.title}</h4>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            mainContent.innerHTML = html;
        }

        function renderNovelDetail(id) {
            const novel = novels.find(n => n.id === String(id));
            if (!novel) return;

            let epsHtml = '';
            if(novel.episodes && novel.episodes.length > 0) {
                novel.episodes.forEach((ep, index) => {
                    epsHtml += `
                        <button onclick="navigate('novel_reader', '${novel.id}', ${index})" class="text-left px-4 py-3 glass-panel rounded hover:bg-blue-900 hover:text-white transition-colors border-accent text-sm w-full flex justify-between items-center group">
                            <span class="font-serif-thai line-clamp-1">${ep.title}</span>
                            <i class="fa-solid fa-chevron-right text-gray-500 group-hover:text-accent"></i>
                        </button>`;
                });
            }

            let html = `
                <div class="animate-fade-in pb-10">
                    <button onclick="navigate('novels')" class="mb-4 text-gray-400 hover:text-accent transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> กลับสู่หอตำรา
                    </button>

                    <div class="glass-panel p-5 rounded-xl mb-6 border-accent flex flex-col md:flex-row gap-6">
                        <div class="w-1/2 md:w-1/4 mx-auto flex-shrink-0">
                            <img src="${novel.cover}" class="w-full h-auto rounded-lg shadow-glow-red border-2 border-accent">
                        </div>
                        <div class="flex-1">
                            <h2 class="text-2xl md:text-3xl font-bold font-serif-thai text-accent text-shadow-glow mb-3">${novel.title}</h2>
                            <div class="flex gap-2 text-xs mb-4 text-gray-300">
                                <span class="bg-purple-900/80 px-3 py-1.5 rounded-full border border-purple-500/50"><i class="fa-solid fa-book"></i> นิยายบรรยาย</span>
                                <span class="bg-blue-900/80 px-3 py-1.5 rounded-full border border-blue-500/50">ทั้งหมด ${novel.totalChapters} ตอน</span>
                            </div>
                            <h3 class="font-bold mb-2 text-gray-300 border-b border-gray-600 pb-1">แนะนำเรื่อง</h3>
                            <p class="text-sm leading-relaxed text-gray-200 font-serif-thai whitespace-pre-wrap">
                                ${novel.description}
                            </p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-xl font-bold mb-4 font-serif-thai text-accent flex items-center gap-2">
                            <i class="fa-solid fa-list-ul"></i> สารบัญตอน
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                            ${epsHtml}
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = html;
        }

        function renderNovelReader(novelId, chapterIndex) {
            const novel = novels.find(n => n.id === String(novelId));
            if (!novel || !novel.episodes[chapterIndex]) return;

            const chapter = novel.episodes[chapterIndex];
            
            let prevBtn = chapterIndex > 0 
                ? `<button onclick="navigate('novel_reader', '${novelId}', ${chapterIndex - 1})" class="text-gray-400 hover:text-accent"><i class="fa-solid fa-chevron-left mr-1"></i> ตอนก่อนหน้า</button>`
                : `<div class="w-20"></div>`;
                
            let nextBtn = chapterIndex < novel.episodes.length - 1 
                ? `<button onclick="navigate('novel_reader', '${novelId}', ${chapterIndex + 1})" class="text-accent font-bold hover:text-white">ตอนถัดไป <i class="fa-solid fa-chevron-right ml-1"></i></button>`
                : `<div class="w-20 text-right text-gray-500 text-sm">จบเล่ม</div>`;

            let html = `
                <div class="animate-fade-in pb-10 max-w-3xl mx-auto">
                    <!-- Top Bar -->
                    <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-3">
                        <button onclick="navigate('novel_detail', '${novelId}')" class="text-gray-400 hover:text-accent transition-colors">
                            <i class="fa-solid fa-arrow-left text-lg"></i>
                        </button>
                        <div class="text-center truncate px-4">
                            <div class="text-xs text-gray-500 truncate">${novel.title}</div>
                            <div class="font-bold text-accent font-serif-thai truncate">${chapter.title}</div>
                        </div>
                        <button onclick="toggleTextSize()" class="text-gray-400 hover:text-accent" title="ปรับขนาดตัวอักษร">
                            <i class="fa-solid fa-text-height text-lg"></i>
                        </button>
                    </div>

                    <!-- Reader Paper -->
                    <div class="novel-reader-bg p-6 md:p-10 rounded-xl shadow-2xl border border-gray-800">
                        <h2 class="text-2xl font-bold text-center mb-8 font-serif-thai text-accent">${chapter.title}</h2>
                        <div class="novel-content text-gray-300" id="reading-content">
                            ${chapter.content.replace(/\n\n/g, '</p><p>')}
                        </div>
                    </div>

                    <!-- Bottom Nav Controls -->
                    <div class="flex justify-between items-center mt-8 px-4">
                        ${prevBtn}
                        <button onclick="navigate('novel_detail', '${novelId}')" class="text-gray-500 hover:text-white text-xl"><i class="fa-solid fa-list"></i></button>
                        ${nextBtn}
                    </div>
                </div>
            `;
            mainContent.innerHTML = html;
            window.scrollTo(0,0);
        }

        let isLargeText = false;
        function toggleTextSize() {
            const content = document.getElementById('reading-content');
            if(!content) return;
            isLargeText = !isLargeText;
            if(isLargeText) {
                content.style.fontSize = '1.35rem';
                content.style.lineHeight = '2.2';
            } else {
                content.style.fontSize = '1.125rem';
                content.style.lineHeight = '2';
            }
        }

        // --- 8. History ---
        function renderHistory() {
            let html = `
                <div class="mb-6">
                    <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai">บันทึกการเดินทาง</h2>
                    <p class="text-sm opacity-80">ประวัติการรับชมและอ่านคัมภีร์</p>
                </div>
            `;

            if (state.history.length === 0) {
                html += `<div class="text-center py-10 text-gray-500 font-serif-thai"><i class="fa-solid fa-wind text-4xl mb-3 opacity-50"></i><br>ยังไม่มีบันทึกใดๆ</div>`;
            } else {
                html += `<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">`;
                
                // Show unique history items, latest first
                let uniqueHistory = [...new Set(state.history)].reverse();
                
                uniqueHistory.forEach(historyId => {
                    let item = null;
                    let type = '';
                    let navPath = '';
                    
                    if(historyId.startsWith('M')) {
                        item = movies.find(m => m.id === historyId.substring(1));
                        type = '<i class="fa-solid fa-film text-blue-400"></i> วิดีโอ';
                        navPath = 'movie';
                    } else if(historyId.startsWith('N')) {
                        item = novels.find(n => n.id === historyId.substring(1));
                        type = '<i class="fa-solid fa-book text-purple-400"></i> นิยาย';
                        navPath = 'novel_detail';
                    }

                    if(item) {
                        html += `
                            <div class="movie-card glass-panel" onclick="navigate('${navPath}', '${item.id}')">
                                <div class="movie-poster-container">
                                    <img src="${item.cover}" class="movie-poster" alt="${item.title}">
                                    <div class="mystic-overlay flex items-start justify-end p-2">
                                        <span class="text-[10px] font-bold bg-black/80 px-2 py-1 rounded border border-gray-600 shadow-lg">
                                            ${type}
                                        </span>
                                    </div>
                                </div>
                                <div class="p-3 text-center h-[3.5rem] flex items-center justify-center bg-black/20 border-t border-accent">
                                    <h4 class="font-bold text-sm line-clamp-2 font-serif-thai">${item.title}</h4>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div>`;
            }
            mainContent.innerHTML = html;
        }

        // --- 9. AI Chat Logic (Updated for Novels) ---
        function toggleAIChat() {
            const modal = document.getElementById('ai-chat-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => document.getElementById('chat-input').focus(), 100);
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function toggleVoice() {
            state.voiceEnabled = !state.voiceEnabled;
            const icon = document.getElementById('voice-icon');
            if (state.voiceEnabled) {
                icon.className = 'fa-solid fa-volume-high';
                icon.parentElement.classList.replace('text-gray-500', 'text-yellow-500');
            } else {
                icon.className = 'fa-solid fa-volume-xmark';
                icon.parentElement.classList.replace('text-yellow-500', 'text-gray-500');
                window.speechSynthesis.cancel();
            }
        }

        function handleChatEnter(e) {
            if (e.key === 'Enter') sendChatMessage();
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            addChatMessage(text, 'user');
            input.value = '';

            setTimeout(() => {
                let replyHTML = '';
                let speakTextContent = '';
                
                // Search both movies and novels
                const foundMovies = movies.filter(m => m.title.includes(text) || m.description.includes(text));
                const foundNovels = novels.filter(n => n.title.includes(text) || n.description.includes(text));
                const totalFound = foundMovies.length + foundNovels.length;

                if (text.includes('สวัสดี') || text.includes('ทักทาย')) {
                    replyHTML = 'คารวะผู้ฝึกตน ข้าคือบรรพจารย์ดูแลหอตำราและค่ายกลภาพมายา อยากให้ข้าค้นหาสิ่งใดให้บอกมา...';
                    speakTextContent = replyHTML;
                } else if (text.includes('แนะนำ') || text.includes('น่าดู') || text.includes('น่าอ่าน')) {
                    const allItems = [...movies.map(m=>({...m, isM:true})), ...novels.map(n=>({...n, isM:false}))];
                    const random = allItems[Math.floor(Math.random() * allItems.length)];
                    let tName = random.isM ? "ค่ายกลภาพมายา" : "ตำราวิชา";
                    let navPath = random.isM ? 'movie' : 'novel_detail';
                    
                    speakTextContent = `ข้าขอแนะนำ ${tName} เรื่อง ${random.title} รับรองว่าท่านจะต้องตื่นตาตื่นใจเป็นแน่แท้`;
                    
                    replyHTML = `ข้าขอแนะนำ ${tName} <b>"${random.title}"</b> รับรองว่าท่านจะต้องตื่นตาตื่นใจเป็นแน่แท้`;
                    replyHTML += `<div class="mt-3 bg-yellow-900/40 border border-yellow-600/50 p-3 rounded flex gap-3 items-center">
                                    <img src="${random.cover}" class="w-12 h-16 object-cover rounded border border-yellow-700/50">
                                    <div class="flex flex-col gap-1">
                                        <div class="font-bold text-yellow-300 line-clamp-1">${random.title}</div>
                                        <button onclick="navigate('${navPath}', '${random.id}'); toggleAIChat();" class="text-xs bg-yellow-600 px-3 py-1.5 rounded text-black font-bold hover:bg-yellow-500 w-fit">เข้าไปชม</button>
                                    </div>
                                  </div>`;
                } else if (totalFound > 0) {
                    speakTextContent = `อา... ข้าพบคัมภีร์ที่ท่านตามหาแล้ว มีทั้งหมด ${totalFound} เรื่องด้วยกัน`;
                    replyHTML = `อา... ข้าพบสิ่งที่ท่านตามหาแล้ว มีดังนี้:<br>`;
                    
                    let displayItems = [...foundMovies.map(m=>({...m, isM:true})), ...foundNovels.map(n=>({...n, isM:false}))].slice(0, 3);
                    
                    displayItems.forEach(item => {
                        let tIcon = item.isM ? '<i class="fa-solid fa-film text-blue-400 mr-1"></i>' : '<i class="fa-solid fa-book text-purple-400 mr-1"></i>';
                        let navPath = item.isM ? 'movie' : 'novel_detail';
                        replyHTML += `<div class="mt-3 bg-yellow-900/40 border border-yellow-600/50 p-3 rounded flex gap-3 items-center">
                                        <img src="${item.cover}" class="w-12 h-16 object-cover rounded border border-yellow-700/50">
                                        <div class="flex flex-col gap-1 flex-1">
                                            <div class="font-bold text-yellow-300 line-clamp-1">${item.title}</div>
                                            <div class="text-[10px] text-gray-400">${tIcon} ${item.isM?'วิดีโอ':'นิยาย'}</div>
                                            <button onclick="navigate('${navPath}', '${item.id}'); toggleAIChat();" class="text-xs bg-yellow-600 px-3 py-1 rounded text-black font-bold hover:bg-yellow-500 self-start mt-1">เปิดดู</button>
                                        </div>
                                      </div>`;
                    });
                    
                    if(totalFound > 3) {
                        replyHTML += `<div class="text-xs mt-2 text-yellow-400/80">และเรื่องอื่นๆ อีก ${totalFound - 3} เรื่อง...</div>`;
                    }
                } else {
                    speakTextContent = 'น่าเสียดาย หอคัมภีร์ของเรายังไม่มีบันทึกเรื่องราวที่ท่านตามหา ลองค้นหาด้วยคำอื่นดูเถิด...';
                    replyHTML = speakTextContent;
                }

                addChatMessage(replyHTML, 'ai');
                speakText(speakTextContent); 
            }, 600);
        }

        function addChatMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            
            if (sender === 'user') {
                div.className = 'chat-bubble-user p-3 self-end max-w-[80%] text-sm text-blue-100 shadow-md';
                div.textContent = text;
            } else {
                div.className = 'chat-bubble-ai p-3 self-start max-w-[85%] text-sm text-yellow-100 shadow-md';
                div.innerHTML = text;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function speakText(text) {
            if (!state.voiceEnabled || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 1.0; 
            utterance.pitch = 0.8; 
            window.speechSynthesis.speak(utterance);
        }

        // Add dynamic CSS animations
        const style = document.createElement('style');
        style.innerHTML = `
            .text-shadow-glow { text-shadow: 0 0 15px currentColor; }
            .shadow-glow-red { box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
            @keyframes spin-slow { 100% { transform: rotate(360deg); } }
            .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        `;
        document.head.appendChild(style);

        // Bootstrap App
        window.onload = fetchDataFromAPI;

    </script>
</body>
