<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-FLIX: หอตำราหมื่นลี้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Maitree:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050101; 
            --red-mystic: #8a0303; 
            --gold-celestial: #e6c27a; 
            --gold-dark: #997a3d;
            --text-glow: 0 0 12px rgba(230, 194, 122, 0.7);
            --box-glow: 0 0 25px rgba(138, 3, 3, 0.5);
            --gold-shadow: 0 4px 15px rgba(230, 194, 122, 0.2);
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at 50% 0%, #200101 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .font-maitree { font-family: 'Maitree', serif; }

        /* ซ่อน Scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .celestial-bg {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(138,3,3,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(230,194,122,0.05) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
        }

        .particles {
            position: absolute; inset: 0; pointer-events: none; z-index: 1;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, var(--gold-celestial), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 120px, var(--gold-celestial), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 150px 60px, var(--gold-celestial), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            animation: stars 80s linear infinite;
            opacity: 0.4;
        }
        @keyframes stars { from { transform: translateY(0); } to { transform: translateY(-250px); } }

        .movie-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(230, 194, 122, 0.15);
            background: #0a0101;
        }
        .movie-card:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: var(--gold-celestial);
            box-shadow: var(--box-glow), 0 10px 20px rgba(0,0,0,0.9);
            z-index: 10;
        }
        .movie-card .overlay {
            background: linear-gradient(to top, #000 10%, transparent 50%, rgba(138, 3, 3, 0.3) 100%);
        }

        .cat-btn {
            background: rgba(10, 0, 0, 0.7);
            border: 1px solid var(--gold-dark);
            color: var(--gold-celestial);
            transition: all 0.3s;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 6px 20px; line-height: 1.2; backdrop-blur: 4px;
        }
        .cat-btn:hover { background: rgba(230, 194, 122, 0.1); border-color: var(--gold-celestial); }
        .cat-btn.active {
            background: linear-gradient(to bottom, #700000, #300000);
            border-color: var(--gold-celestial); color: #fff;
            text-shadow: var(--text-glow); box-shadow: 0 0 15px rgba(138,3,3,0.8);
        }

        .nav-btn { color: #6b7280; transition: all 0.3s; }
        .nav-btn.active { 
            color: var(--gold-celestial); 
            text-shadow: 0 0 8px rgba(230, 194, 122, 0.5);
        }

        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ep-card {
            border: 1px solid rgba(153, 122, 61, 0.3);
            background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(20,0,0,0.6));
            transition: all 0.3s ease;
        }
        .ep-card:hover, .ep-card.active {
            border-color: var(--gold-celestial);
            background: linear-gradient(to right, rgba(138,3,3,0.3), rgba(0,0,0,0.8));
            box-shadow: 0 0 15px rgba(230,194,122,0.15);
        }
        .ep-card .ep-thumb { transition: all 0.3s ease; }
        .ep-card:hover .ep-thumb, .ep-card.active .ep-thumb { opacity: 1; transform: scale(1.05); }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.8); }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

        /* Loader แก้ไขให้จัดกึ่งกลางถูกต้อง */
        .loader-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="app-wrapper" class="relative w-full h-[100dvh] md:w-[420px] md:h-[90vh] md:rounded-[2.5rem] bg-[var(--bg-dark)] overflow-hidden flex flex-col shadow-[0_0_80px_rgba(138,3,3,0.3)] md:border-[6px] md:border-[#2a0505] z-10">
        
        <!-- Loading Screen โฉมใหม่ (ไอคอนคัมภีร์) -->
        <div id="global-loader" class="loader-overlay">
            <div class="relative w-28 h-28 rounded-full border-[3px] border-[var(--gold-dark)] flex items-center justify-center mb-6 bg-gradient-to-b from-[#2a0101] to-black shadow-[0_0_40px_rgba(230,194,122,0.3)]">
                <i data-lucide="scroll" class="w-12 h-12 text-[var(--gold-celestial)] animate-pulse drop-shadow-[0_0_10px_rgba(230,194,122,0.8)] relative z-10"></i>
                <div class="absolute -inset-3 rounded-full border border-[var(--gold-celestial)]/30 animate-spin" style="animation-duration: 8s;"></div>
                <div class="absolute -inset-1 rounded-full border border-[var(--primary-red)]/40 animate-spin border-dashed" style="animation-duration: 4s; animation-direction: reverse;"></div>
            </div>
            <p class="text-[var(--gold-celestial)] font-maitree text-xl animate-pulse font-bold tracking-widest" style="text-shadow: var(--text-glow);">กำลังเบิกคัมภีร์...</p>
        </div>

        <div class="celestial-bg"></div>
        <div class="particles"></div>

        <div id="toast-container" class="absolute top-5 left-1/2 -translate-x-1/2 z-[1000] transition-all duration-300 opacity-0 pointer-events-none bg-gradient-to-r from-[#300000] to-[#1a0000] border border-[var(--gold-celestial)] text-[var(--gold-celestial)] px-5 py-2.5 rounded-full font-maitree text-sm shadow-[0_0_20px_rgba(230,194,122,0.4)] flex items-center gap-3">
            <i data-lucide="bell-ring" class="w-4 h-4"></i>
            <span id="toast-msg">บัญชาสวรรค์</span>
        </div>

        <header id="main-header" class="absolute top-0 w-full z-50 px-5 py-3 bg-gradient-to-b from-black via-black/80 to-transparent transition-transform duration-300">
            <div class="flex justify-between items-center h-12 mt-1">
                <h1 class="text-[26px] font-bold font-maitree text-[var(--gold-celestial)] tracking-wider" style="text-shadow: var(--text-glow);">หอตำราหมื่นลี้</h1>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleSearch()" class="text-[var(--gold-celestial)] hover:text-white transition transform hover:scale-110">
                        <i data-lucide="search" class="w-6 h-6"></i>
                    </button>
                    <div class="w-9 h-9 rounded-full border border-[var(--gold-celestial)] overflow-hidden p-0.5 shadow-[0_0_10px_rgba(230,194,122,0.3)] bg-black">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Jiao&backgroundColor=b6e3f4" class="w-full h-full rounded-full object-cover">
                    </div>
                </div>
            </div>
            
            <div id="search-container" class="hidden mt-3 fade-in-up" style="animation-duration: 0.3s;">
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-4 top-[10px] w-5 h-5 text-[var(--gold-dark)] group-focus-within:text-[var(--gold-celestial)] transition-colors"></i>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="ค้นหาตำนานทั่วหล้า..." class="w-full bg-black/80 border border-[var(--gold-dark)] rounded-full py-2.5 pl-12 pr-4 text-[var(--gold-celestial)] placeholder-[var(--gold-dark)] focus:outline-none focus:border-[var(--gold-celestial)] focus:shadow-[0_0_15px_rgba(230,194,122,0.3)] text-sm font-maitree transition-all">
                </div>
            </div>
        </header>

        <main id="app-content" class="flex-1 overflow-y-auto hide-scrollbar relative z-10 custom-scroll pb-[80px]">
            <!-- เนื้อหาจะถูกแทรกผ่าน JS -->
        </main>

        <!-- กุนซือ AI (เปลี่ยนไอคอนเป็นการ์ตูนจอมยุทธ์) -->
        <button id="ai-fab" onclick="toggleAIModal()" class="absolute bottom-[95px] right-4 z-40 w-14 h-14 bg-gradient-to-br from-[#2a0101] to-[#000] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(230,194,122,0.6)] border-2 border-[var(--gold-celestial)] transition-transform hover:scale-110 hover:rotate-6 duration-300 overflow-hidden p-0.5">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=LiBai&backgroundColor=transparent&skinColor=f2d3b1&hair=long01&hairColor=000000" class="w-full h-full rounded-full bg-[#500000]">
        </button>

        <div id="ai-modal" class="absolute inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex-col justify-end transition-opacity">
            <div class="bg-gradient-to-b from-[#1a0101] to-[#000] w-full h-[85%] rounded-t-[2.5rem] border-t-2 border-[var(--gold-celestial)] flex flex-col shadow-[0_-15px_40px_rgba(138,3,3,0.5)] fade-in-up relative overflow-hidden">
                <div class="particles" style="opacity: 0.1;"></div>
                <div class="flex justify-between items-center px-6 py-4 border-b border-[var(--gold-dark)]/30 relative z-10 bg-black/60">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-full bg-[#500000] flex items-center justify-center border border-[var(--gold-celestial)] shadow-[0_0_10px_rgba(230,194,122,0.3)] overflow-hidden p-0.5">
                            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=LiBai&backgroundColor=transparent&skinColor=f2d3b1&hair=long01&hairColor=000000" class="w-full h-full rounded-full bg-[#2a0101]">
                        </div>
                        <div>
                            <h3 class="font-bold font-maitree text-[var(--gold-celestial)] text-lg" style="text-shadow: var(--text-glow);">กุนซือ AI แห่งหอตำรา</h3>
                            <p class="text-[10px] text-[var(--gold-dark)] font-maitree">ค้นหา แนะนำ จัดการให้ท่าน</p>
                        </div>
                    </div>
                    <button onclick="toggleAIModal()" class="text-[var(--gold-dark)] hover:text-[var(--gold-celestial)] transition p-1.5 bg-black/50 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <div id="ai-chatbox" class="flex-1 custom-scroll overflow-y-auto p-5 space-y-4 font-maitree relative z-10 text-base">
                    <div class="flex gap-3">
                        <div class="w-9 h-9 rounded-full bg-[#500000] shrink-0 flex justify-center items-center border border-[var(--gold-celestial)] mt-1 overflow-hidden p-0.5">
                            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=LiBai&backgroundColor=transparent&skinColor=f2d3b1&hair=long01&hairColor=000000" class="w-full h-full rounded-full bg-[#2a0101]">
                        </div>
                        <div class="bg-[#2a0101]/90 border border-[var(--gold-dark)] text-[var(--gold-celestial)] p-3.5 rounded-xl rounded-tl-none shadow-md max-w-[85%] leading-relaxed backdrop-blur-sm">
                            คารวะท่านจอมยุทธ์! ปรารถนาจะให้ข้าค้นหาตำนานเรื่องใด เช่น "ขอหนังรัก" หรือชื่อหนังที่ท่านต้องการ เชิญเอยวาจามาได้เลย...
                        </div>
                    </div>
                </div>

                <div class="p-4 border-t border-[var(--gold-dark)]/30 bg-[#0a0000]/95 relative z-10">
                    <div class="flex gap-3 relative">
                        <input type="text" id="ai-input" placeholder="ถามข้าเรื่องหนัง หรือแนวที่อยากดู..." class="flex-1 bg-[#1a0101] border border-[var(--gold-dark)] rounded-full px-5 py-3 text-[var(--gold-celestial)] placeholder-[var(--gold-dark)] focus:outline-none focus:border-[var(--gold-celestial)] focus:shadow-[0_0_10px_rgba(230,194,122,0.3)] font-maitree text-sm" onkeypress="if(event.key === 'Enter') sendAIMessage()">
                        <button onclick="sendAIMessage()" class="absolute right-2 top-1 w-10 h-10 rounded-full bg-[var(--gold-celestial)] flex items-center justify-center text-[#200101] hover:bg-white hover:scale-105 transition-all shadow-[0_0_10px_rgba(230,194,122,0.5)]">
                            <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- เมนูหลักด้านล่าง -->
        <nav id="bottom-nav" class="absolute bottom-0 w-full h-[80px] bg-gradient-to-t from-[#000] via-[#050101]/95 to-transparent z-40 flex justify-around items-center px-4 pb-3 pt-5 border-t border-[var(--gold-dark)]/20 md:rounded-b-[2.5rem]">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center gap-1.5 w-20 group">
                <div class="relative">
                    <i data-lucide="home" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[var(--gold-celestial)] rounded-full opacity-0 group-[.active]:opacity-100 transition-opacity shadow-[0_0_5px_#e6c27a]"></div>
                </div>
                <span class="text-[11px] font-bold font-maitree tracking-wide mt-0.5">ตำหนักหลัก</span>
            </button>
            <button onclick="switchTab('continue')" id="nav-continue" class="nav-btn flex flex-col items-center gap-1.5 w-20 group">
                <div class="relative">
                    <i data-lucide="play-square" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[var(--gold-celestial)] rounded-full opacity-0 group-[.active]:opacity-100 transition-opacity shadow-[0_0_5px_#e6c27a]"></div>
                </div>
                <span class="text-[11px] font-bold font-maitree tracking-wide mt-0.5">ดูต่อ</span>
            </button>
            <button onclick="switchTab('library')" id="nav-library" class="nav-btn flex flex-col items-center gap-1.5 w-20 group">
                <div class="relative">
                    <i data-lucide="book-open" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-[var(--gold-celestial)] rounded-full opacity-0 group-[.active]:opacity-100 transition-opacity shadow-[0_0_5px_#e6c27a]"></div>
                </div>
                <span class="text-[11px] font-bold font-maitree tracking-wide mt-0.5">หอตำราข้า</span>
            </button>
        </nav>

    </div>

    <script>
        // ⚡ ตั้งค่า Google Apps Script URL ที่นี่ ⚡
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx8Zw7yc9QlPrU9PeaJ6koVbk9UqAZhRIDUSxKvqhQnyc5sp27V0rkxb5FbNKivIfhi/exec";
        
        // รูป Avatar ของกุนซือ AI
        const AI_AVATAR = "https://api.dicebear.com/7.x/adventurer/svg?seed=LiBai&backgroundColor=transparent&skinColor=f2d3b1&hair=long01&hairColor=000000";

        let moviesData = [];
        let categories = ["ทั้งหมด"];
        
        // ดึงประวัติจาก LocalStorage
        let watchHistory = JSON.parse(localStorage.getItem('mflix_history') || '[]');

        let state = {
            tab: 'home', category: 'ทั้งหมด', searchQuery: '', bannerIndex: 0,
            activeMovie: null, activeEpisodeIndex: 0, view: 'main'
        };
        let bannerInterval;
        let isAiThinking = false; // ป้องกันการกดส่งรัวๆ

        document.addEventListener('DOMContentLoaded', () => {
            fetchMoviesData(); // ดึงข้อมูลตอนเปิดเว็บ
            lucide.createIcons();
        });

        // ==========================================
        // ดึงข้อมูลจากชีต (Google Apps Script)
        // ==========================================
        async function fetchMoviesData() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getMoviesData' })
                });
                
                const json = await res.json();
                if (json.status === 'success') {
                    // แปลงข้อมูลให้เข้ากับ Frontend
                    moviesData = json.movies.map((m, index) => {
                        return {
                            id: m.id || index.toString(),
                            title: m.title || 'ไม่มีชื่อเรื่อง',
                            description: m.desc || 'ไม่มีคำอธิบายสำหรับตำรานี้...',
                            cover: m.cover || 'https://images.unsplash.com/photo-1574267432553-4b4628081524?q=80&w=1000',
                            poster: m.poster || 'https://images.unsplash.com/photo-1574267432553-4b4628081524?q=80&w=400',
                            rating: (Math.random() * 1.5 + 8.5).toFixed(1), // สุ่ม rating เพื่อความสวยงาม
                            year: new Date().getFullYear(),
                            genre: m.category || 'ทั่วไป',
                            type: 'movie',
                            episodes: m.episodes && m.episodes.length > 0 ? m.episodes.map(e => ({
                                ep: e.ep,
                                title: e.title,
                                videoUrl: e.url, // ลิงก์จากชีต
                                thumb: m.poster || m.cover
                            })) : [{ ep: 1, title: 'ตอนเดียวจบ', videoUrl: '', thumb: m.poster }]
                        };
                    });
                    
                    if (json.categories && json.categories.length > 0) {
                        categories = json.categories;
                        state.category = categories[0];
                    } else if (moviesData.length > 0) {
                        categories = [...new Set(moviesData.map(m => m.genre))];
                        state.category = categories[0];
                    }

                    // ปิด Loader
                    document.getElementById('global-loader').style.display = 'none';
                    
                    renderApp();
                    startBannerAutoPlay();
                } else {
                    throw new Error("เซิร์ฟเวอร์ตอบกลับไม่สำเร็จ");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                const loader = document.getElementById('global-loader');
                loader.innerHTML = `
                    <div class="flex flex-col items-center bg-[#1a0101] p-8 rounded-3xl border border-[var(--gold-dark)] shadow-[0_0_30px_rgba(138,3,3,0.5)]">
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mb-4 animate-bounce"></i>
                        <p class="text-[var(--gold-celestial)] font-maitree text-xl font-bold">ค่ายกลขัดข้อง!</p>
                        <p class="text-[var(--gold-dark)] text-sm font-maitree mt-2">พลังปราณไม่เพียงพอในการเชื่อมต่อหอตำรา</p>
                        <button onclick="location.reload()" class="mt-6 bg-gradient-to-r from-[#700000] to-[#300000] text-[var(--gold-celestial)] px-6 py-2 rounded-full font-maitree border border-[var(--gold-celestial)] hover:scale-105 transition shadow-[0_0_15px_rgba(138,3,3,0.8)]">ลองร่ายคาถาใหม่</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // ==========================================
        // ระบบประวัติการเข้าชม (Continue Watching)
        // ==========================================
        function saveToHistory(movie) {
            // ลบของเดิมออกก่อนถ้ามี (เพื่อดันไปอยู่อันดับ 1)
            watchHistory = watchHistory.filter(m => m.id !== movie.id);
            // เพิ่มเข้าไปข้างหน้าสุด
            watchHistory.unshift(movie);
            // เก็บไว้สูงสุด 20 เรื่อง
            if (watchHistory.length > 20) watchHistory.pop();
            // บันทึกลงเครื่อง
            localStorage.setItem('mflix_history', JSON.stringify(watchHistory));
        }

        // ==========================================
        // UI & Navigation
        // ==========================================
        function showToast(message) {
            const toast = document.getElementById('toast-container');
            document.getElementById('toast-msg').innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 15px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -10px)';
            }, 3000);
        }

        function switchTab(tabId) {
            state.tab = tabId; state.view = 'main'; state.searchQuery = '';
            
            // ล้างช่องค้นหาเมื่อเปลี่ยนหน้า
            document.getElementById('search-input').value = '';
            const searchContainer = document.getElementById('search-container');
            if(searchContainer && !searchContainer.classList.contains('hidden')) {
                searchContainer.classList.add('hidden');
            }

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');
            renderApp();
        }

        function setCategory(cat) { state.category = cat; renderApp(); }

        function toggleSearch() {
            const searchContainer = document.getElementById('search-container');
            searchContainer.classList.toggle('hidden');
            if(!searchContainer.classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            } else {

            state.activeEpisodeIndex = 0;

            const iframe = document.querySelector('#video-wrapper iframe');

            if (videoObj) videoObj.pause();

            state.view = 'main'; state.activeMovie = null;

                    state.bannerIndex = (state.bannerIndex + 1) % Math.min(5, moviesData.length);

                    if (bannerContainer) { bannerContainer.innerHTML = generateBannerHTML(); lucide.createIcons(); }

        function toggleAIModal() {

            modal.classList.toggle('hidden');

        async function getSmartAIResponse(text) {
            const query = text.toLowerCase();
            // หน่วงเวลาให้ดูเหมือนคิด
            await new Promise(r => setTimeout(r, 1000)); 

            // ค้นหาในฐานข้อมูลที่เราโหลดมาจากชีต
            let results = moviesData.filter(m => 
                m.title.toLowerCase().includes(query) || 
                m.genre.toLowerCase().includes(query) ||
                m.description.toLowerCase().includes(query)
            );

            if (results.length === 0) {
                // เช็คว่ามีคำที่ตรงกับหมวดหมู่ไหม
                let keywordMatch = categories.find(c => query.includes(c.toLowerCase()));
                if(keywordMatch) {
                    results = moviesData.filter(m => m.genre === keywordMatch).slice(0,3);
                    return `ข้าคัดสรรตำราหมวด <strong class="text-[var(--gold-celestial)]">${keywordMatch}</strong> มาให้ท่านแล้ว:<br><br>
                    ${results.map(m => `✧ <strong class="text-white underline cursor-pointer hover:text-[var(--gold-celestial)]" onclick="openMovieFromAI('${m.id}')">${m.title}</strong>`).join('<br>')}`;
                }
                
                // สุ่มเรื่องแนะนำ
                if(moviesData.length > 0) {
                    const randomMovie = moviesData[Math.floor(Math.random() * moviesData.length)];
                    return `ข้าไม่พบสิ่งที่ท่านหาเลยนายท่าน ลองชมเรื่องนี้แทนดีหรือไม่?<br><br>
                    ✧ <strong class="text-[var(--gold-celestial)] cursor-pointer underline" onclick="openMovieFromAI('${randomMovie.id}')">${randomMovie.title}</strong> สนุกยิ่งนัก!`;
                } else {
                    return "หอตำราว่างเปล่า ข้ามิพบสิ่งใดเลย...";
                }
            }

            const topResults = results.slice(0, 3);
            let response = `ข้าค้นพบตำนานที่คู่ควรกับท่านแล้ว:<br><br>`;
            topResults.forEach(m => {
                response += `<div class="bg-black/40 border border-[var(--gold-dark)]/50 p-2 rounded-lg mb-2 flex gap-3 cursor-pointer hover:border-[var(--gold-celestial)] transition" onclick="openMovieFromAI('${m.id}')">
                    <img src="${m.poster}" class="w-10 h-14 object-cover rounded border border-[var(--gold-dark)]">
                    <div>
                        <div class="font-bold text-[var(--gold-celestial)] text-sm">${m.title}</div>
                        <div class="text-[10px] text-gray-400">หมวด: ${m.genre}</div>
                    </div>
                </div>`;
            });
            return response;
        }

        function openMovieFromAI(id) { toggleAIModal(); openPlayer(id); }

        async function sendAIMessage() {
            if (isAiThinking) return; // ป้องกันส่งรัวๆ

            const inputEl = document.getElementById('ai-input');
            let text = inputEl.value.trim();
            if(!text) return;
            
            // ป้องกัน XSS (เปลี่ยน tag HTML ให้กลายเป็นตัวหนังสือธรรมดา)
            text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            isAiThinking = true;

            const chatbox = document.getElementById('ai-chatbox');
            chatbox.innerHTML += `<div class="flex gap-3 justify-end fade-in-up"><div class="bg-gradient-to-r from-[var(--red-mystic)] to-[#500000] border border-[var(--gold-dark)] text-white p-3 rounded-xl rounded-tr-none text-sm max-w-[85%] shadow-lg">${text}</div></div>`;
            inputEl.value = ''; chatbox.scrollTop = chatbox.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatbox.innerHTML += `<div id="${loadingId}" class="flex gap-3 fade-in-up"><div class="w-9 h-9 rounded-full bg-[#500000] shrink-0 flex justify-center items-center border border-[var(--gold-celestial)] mt-1 overflow-hidden p-0.5"><img src="${AI_AVATAR}" class="w-full h-full rounded-full bg-[#2a0101]"></div><div class="bg-[#2a0101]/90 border border-[var(--gold-dark)] text-[var(--gold-dark)] p-3 rounded-xl rounded-tl-none shadow-md flex items-center gap-2 text-sm"><i data-lucide="loader-2" class="w-4 h-4 animate-spin text-[var(--gold-celestial)]"></i> กำลังใช้วิชาเปิดตำรา...</div></div>`;
            lucide.createIcons(); chatbox.scrollTop = chatbox.scrollHeight;

            const aiResponse = await getSmartAIResponse(text);
            document.getElementById(loadingId).remove();
            
            chatbox.innerHTML += `<div class="flex gap-3 fade-in-up"><div class="w-9 h-9 rounded-full bg-[#500000] shrink-0 flex justify-center items-center border border-[var(--gold-celestial)] mt-1 overflow-hidden p-0.5"><img src="${AI_AVATAR}" class="w-full h-full rounded-full bg-[#2a0101]"></div><div class="bg-[#2a0101]/90 border border-[var(--gold-dark)] text-[var(--gold-celestial)] p-3 rounded-xl rounded-tl-none shadow-md max-w-[90%] leading-relaxed backdrop-blur-sm text-sm">${aiResponse}</div></div>`;
            lucide.createIcons(); chatbox.scrollTop = chatbox.scrollHeight;

            isAiThinking = false;
        }

        // ==========================================
        // วิดีโอเพลเยอร์ อัจฉริยะ (YouTube, Drive, MP4)
        // ==========================================
        function getVideoElementHTML(url, poster) {
            if (!url) return `<div class="w-full h-full flex flex-col items-center justify-center text-[var(--gold-dark)] bg-[#050101]"><i data-lucide="video-off" class="w-10 h-10 mb-2"></i><p class="font-maitree">ยังไม่มีคัมภีร์ภาพ</p></div>`;

            // เพิ่ม allowfullscreen เพื่อบังคับให้อุปกรณ์อนุญาตการขยายเต็มจอ
            const iframeConfig = 'frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"';

            // ตรวจสอบ YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if(url.includes('youtube.com/watch?v=')) videoId = url.split('v=')[1].split('&')[0];
                else if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                else if(url.includes('youtube.com/embed/')) videoId = url.split('embed/')[1].split('?')[0];
                
                return `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1" ${iframeConfig}></iframe>`;
            }
            
            // ตรวจสอบ Google Drive
            if (url.includes('drive.google.com')) {
                let embedUrl = url;
                if(url.includes('/view')) embedUrl = url.replace('/view', '/preview');
                return `<iframe class="w-full h-full" src="${embedUrl}" ${iframeConfig}></iframe>`;
            }
            
            // ค่าเริ่มต้นสำหรับ MP4, M3U8, และไฟล์วิดีโอทั่วไป
            // การใช้ playsinline จะเล่นในกรอบ แต่เมื่อกดปุ่มขยายจอของเครื่อง (Native Fullscreen) จะเต็มจอและหมุนได้
            return `<video id="main-video" controls autoplay playsinline webkit-playsinline poster="${poster}" class="w-full h-full outline-none object-contain bg-black">
                        <source src="${url}">
                        เบราว์เซอร์ของท่านไม่รองรับการแสดงผลวิชานี้
                    </video>`;
        }

                            <div class="bg-gradient-to-br from-[#700000] to-[#200000] border border-[var(--gold-celestial)] px-2.5 py-1 rounded text-xs text-white font-bold shadow-[0_0_10px_rgba(138,3,3,0.5)] shrink-0">
                                <i data-lucide="star" class="w-3 h-3 inline pb-0.5 text-[var(--gold-celestial)]"></i> ${movie.rating}
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3 text-xs text-[var(--gold-dark)] mb-5 font-maitree relative z-10 bg-black/40 inline-flex px-3 py-1.5 rounded-md border border-[var(--gold-dark)]/30 flex-wrap">
                            <span>ปีที่สร้าง ${movie.year}</span>
                            <span>•</span><span class="text-[var(--gold-celestial)]">หมวด: ${movie.genre}</span>
                            <span>•</span><span class="text-gray-300">รวม ${movie.episodes.length} ม้วนภาพ</span>
                        </div>

                        <p class="text-sm text-gray-300 mb-8 leading-relaxed opacity-90 border-l-[3px] border-[var(--primary-red)] pl-4 bg-gradient-to-r from-[#1a0101] to-transparent py-2 relative z-10">${movie.description}</p>

                        <div class="flex justify-around mb-8 border-y border-[var(--gold-dark)]/30 py-4 bg-black/40 rounded-xl relative z-10 shadow-inner">
                            <button onclick="showToast('จารึกเข้าหอตำราของท่านแล้ว')" class="flex flex-col items-center gap-2 text-[var(--gold-celestial)] hover:text-white hover:-translate-y-1 transition-transform group">
                                <div class="w-10 h-10 rounded-full border border-[var(--gold-dark)] flex items-center justify-center group-hover:border-[var(--primary-red)] group-hover:bg-[#300000] bg-[#1a0101] transition-colors"><i data-lucide="bookmark-plus" class="w-5 h-5"></i></div>
                                <span class="text-[11px] font-maitree">เก็บตำรา</span>
                            </button>
                            <button onclick="showToast('คัดลอกรหัสวิญญาณเพื่อส่งต่อ')" class="flex flex-col items-center gap-2 text-[var(--gold-celestial)] hover:text-white hover:-translate-y-1 transition-transform group">
                                <div class="w-10 h-10 rounded-full border border-[var(--gold-dark)] flex items-center justify-center group-hover:border-[var(--primary-red)] group-hover:bg-[#300000] bg-[#1a0101] transition-colors"><i data-lucide="share-2" class="w-5 h-5"></i></div>
                                <span class="text-[11px] font-maitree">ส่งมอบ</span>
                            </button>
                            <button onclick="showToast('พลังปราณกำลังอัญเชิญตำราลงเครื่อง...')" class="flex flex-col items-center gap-2 text-[var(--gold-celestial)] hover:text-white hover:-translate-y-1 transition-transform group">
                                <div class="w-10 h-10 rounded-full border border-[var(--gold-dark)] flex items-center justify-center group-hover:border-[var(--primary-red)] group-hover:bg-[#300000] bg-[#1a0101] transition-colors"><i data-lucide="download" class="w-5 h-5"></i></div>
                                <span class="text-[11px] font-maitree">บันทึก</span>
                            </button>
                        </div>
                        
                        <div class="flex justify-between items-end mb-5 relative z-10">
                            <div class="flex items-center gap-2">
                                <div class="w-1 h-5 bg-[var(--primary-red)] rounded-full shadow-[0_0_8px_red]"></div>
                                <h3 class="font-bold text-[17px] font-maitree text-[var(--gold-celestial)]">ม้วนภาพทั้งหมด</h3>
                            </div>
                            <span class="text-xs text-[var(--gold-celestial)] font-maitree bg-[#2a0101] border border-[var(--gold-dark)]/50 px-2 py-1 rounded-md">กำลังฉาย: ตอน ${currentEp.ep}</span>
                        </div>
                        <div class="space-y-3 pb-10 relative z-10">${episodesHTML}</div>
                    </div>
                </div>
            `;
        }

        function generateLibraryHTML() {
            return `
                <div class="pt-20 px-5 h-full flex flex-col items-center justify-center text-center pb-20 font-maitree fade-in-up">
                    <div class="relative w-28 h-28 rounded-full border-[3px] border-[var(--gold-dark)] flex items-center justify-center mb-6 bg-gradient-to-b from-[#2a0101] to-black shadow-[0_0_40px_rgba(230,194,122,0.15)] group hover:border-[var(--gold-celestial)] transition-colors">
                        <i data-lucide="scroll" class="w-12 h-12 text-[var(--gold-celestial)] group-hover:scale-110 transition-transform drop-shadow-[0_0_10px_rgba(230,194,122,0.8)] relative z-10"></i>
                        <div class="absolute -inset-3 rounded-full border border-[var(--gold-celestial)]/30 animate-spin" style="animation-duration: 12s;"></div>
                        <div class="absolute -inset-1 rounded-full border border-[var(--primary-red)]/40 animate-spin border-dashed" style="animation-duration: 8s; animation-direction: reverse;"></div>
                    </div>
                    <h2 class="text-3xl font-bold text-[var(--gold-celestial)] mb-2" style="text-shadow: var(--text-glow);">หอตำราลับส่วนตัว</h2>
                    <p class="text-[15px] text-[var(--gold-dark)] mb-10 font-prompt max-w-[280px]">ฟังก์ชันนี้สงวนไว้สำหรับศิษย์สายในเท่านั้น โปรดติดตามการอัปเดต...</p>
                    <button onclick="switchTab('home')" class="relative overflow-hidden bg-transparent border-2 border-[var(--gold-celestial)] text-[var(--gold-celestial)] px-12 py-3.5 rounded-full font-bold text-base hover:text-white hover:border-transparent transition-all hover:scale-105 group shadow-[0_0_15px_rgba(230,194,122,0.2)]">
                        <span class="relative z-10">กลับสู่ตำหนักหลัก</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-[var(--red-mystic)] to-[#400000] opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-0"></div>
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
