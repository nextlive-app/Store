<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone - Video Player</title>
    <!-- ใช้ Tailwind CSS สำหรับการตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดไอคอนจาก Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ฟอนต์ภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        yt: {
                            black: '#0f0f0f',
                            dark: '#212121',
                            gray: '#aaaaaa',
                            light: '#f1f1f1',
                            red: '#ff0000',
                            hover: '#3f3f3f',
                            search: '#121212'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ปรับแต่ง Scrollbar สไตล์ YouTube */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #717171;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            overflow-x: hidden;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <!-- Navbar ด้านบน -->
    <header class="flex justify-between items-center px-4 py-2 bg-yt-black fixed w-full top-0 z-50 h-16">
        <div class="flex items-center gap-4">
            <button class="p-2 hover:bg-yt-hover rounded-full transition-colors hidden md:block">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center gap-1 cursor-pointer">
                <i data-lucide="youtube" class="w-8 h-8 text-yt-red fill-yt-red"></i>
                <span class="text-xl font-semibold tracking-tighter">YouTube</span>
                <span class="text-[10px] text-yt-gray mb-3">TH</span>
            </div>
        </div>

        <div class="flex items-center flex-1 max-w-[720px] ml-10 mr-4 gap-4">
            <div class="flex flex-1 items-center bg-yt-search border border-yt-hover rounded-full overflow-hidden">
                <div class="pl-4 pr-2 hidden md:block text-yt-gray">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
                <input type="text" id="url-input" placeholder="วางลิงก์วิดีโอ (YouTube, MP4, Google Drive)..." 
                    class="w-full bg-transparent border-none outline-none py-2 px-4 text-yt-light font-light text-base">
                <button onclick="handlePlayUrl()" class="px-5 py-2 bg-yt-dark hover:bg-yt-hover border-l border-yt-hover transition-colors">
                    เล่นวิดีโอ
                </button>
            </div>
            <button class="p-2 bg-yt-dark hover:bg-yt-hover rounded-full transition-colors hidden sm:block">
                <i data-lucide="mic" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <button class="p-2 hover:bg-yt-hover rounded-full transition-colors hidden sm:block">
                <i data-lucide="video" class="w-6 h-6"></i>
            </button>
            <button class="p-2 hover:bg-yt-hover rounded-full transition-colors hidden sm:block">
                <i data-lucide="bell" class="w-6 h-6"></i>
            </button>
            <button class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-semibold overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile" class="w-full h-full object-cover">
            </button>
        </div>
    </header>

    <!-- พื้นที่หลัก -->
    <div class="flex flex-1 mt-16 h-[calc(100vh-64px)]">
        <!-- แถบด้านข้าง (Sidebar) -->
        <aside class="w-[240px] bg-yt-black overflow-y-auto hidden lg:flex flex-col py-3 px-3 custom-scrollbar">
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg bg-yt-hover hover:bg-yt-hover transition-colors font-medium">
                <i data-lucide="home" class="w-5 h-5"></i> หน้าแรก
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="flame" class="w-5 h-5"></i> มาแรง
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="youtube" class="w-5 h-5"></i> Shorts
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="play-square" class="w-5 h-5"></i> การติดตาม
            </a>
            
            <div class="h-[1px] bg-yt-hover my-3 mx-2"></div>
            
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="library" class="w-5 h-5"></i> คลังวิดีโอ
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i> ประวัติการเข้าชม
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="clock" class="w-5 h-5"></i> ดูภายหลัง
            </a>
            <a href="#" class="flex items-center gap-4 p-3 rounded-lg hover:bg-yt-hover transition-colors">
                <i data-lucide="thumbs-up" class="w-5 h-5"></i> วิดีโอที่ชอบ
            </a>
        </aside>

        <!-- เนื้อหาหลัก (Video Player & Grid) -->
        <main class="flex-1 overflow-y-auto bg-yt-black p-4 sm:p-6 custom-scrollbar">
            
            <!-- โซนเครื่องเล่นวิดีโอหลัก -->
            <div id="player-wrapper" class="max-w-6xl mx-auto w-full mb-8" style="display: none;">
                <div id="video-container" class="w-full aspect-video bg-black rounded-xl overflow-hidden shadow-lg border border-yt-hover">
                    <!-- เครื่องเล่นจะถูกสร้างที่นี่โดย JS -->
                </div>
                <div class="mt-4">
                    <h1 id="video-title" class="text-xl sm:text-2xl font-semibold mb-2">กำลังเล่นวิดีโอ...</h1>
                    <div class="flex flex-wrap justify-between items-center gap-4 text-sm text-yt-gray">
                        <div class="flex items-center gap-3">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Channel" class="w-10 h-10 rounded-full bg-yt-dark">
                            <div>
                                <p class="text-yt-light font-medium text-base">ช่องของฉัน (My Channel)</p>
                                <p>ผู้ติดตาม 1.2M คน</p>
                            </div>
                            <button class="ml-4 bg-white text-black px-4 py-2 rounded-full font-medium hover:bg-gray-200 transition">
                                ติดตาม
                            </button>
                        </div>
                        <div class="flex gap-2">
                            <button class="flex items-center gap-2 bg-yt-dark hover:bg-yt-hover px-4 py-2 rounded-full transition-colors">
                                <i data-lucide="thumbs-up" class="w-4 h-4"></i> 124K
                                <div class="w-[1px] h-4 bg-yt-gray mx-1"></div>
                                <i data-lucide="thumbs-down" class="w-4 h-4"></i>
                            </button>
                            <button class="flex items-center gap-2 bg-yt-dark hover:bg-yt-hover px-4 py-2 rounded-full transition-colors hidden sm:flex">
                                <i data-lucide="share-2" class="w-4 h-4"></i> แชร์
                            </button>
                            <button class="flex items-center gap-2 bg-yt-dark hover:bg-yt-hover px-4 py-2 rounded-full transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i> ดาวน์โหลด
                            </button>
                        </div>
                    </div>
                </div>
                <div class="h-[1px] bg-yt-hover my-6 w-full"></div>
            </div>

            <!-- โซนแนะนำวิดีโอตอนเริ่มต้น -->
            <div id="welcome-message" class="text-center py-10">
                <i data-lucide="play-circle" class="w-20 h-20 mx-auto text-yt-gray mb-4"></i>
                <h2 class="text-2xl font-semibold mb-2">ยินดีต้อนรับสู่ Video Player Custom</h2>
                <p class="text-yt-gray mb-6">กรุณาวางลิงก์วิดีโอ (YouTube, MP4 หรือ Google Drive) ที่ช่องค้นหาด้านบนเพื่อเล่น</p>
                <div class="flex justify-center gap-4 flex-wrap">
                    <button onclick="loadSampleVideo('youtube')" class="bg-yt-dark hover:bg-yt-hover px-4 py-2 rounded-full text-sm border border-yt-hover transition-colors">ทดสอบเล่น YouTube</button>
                    <button onclick="loadSampleVideo('mp4')" class="bg-yt-dark hover:bg-yt-hover px-4 py-2 rounded-full text-sm border border-yt-hover transition-colors">ทดสอบเล่น MP4</button>
                </div>
            </div>

            <!-- วิดีโอแนะนำ (Mockup Data) -->
            <h3 class="text-xl font-bold mb-4 mt-8">วิดีโอแนะนำ</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-8" id="video-grid">
                <!-- เนื้อหาวิดีโอจะถูกสร้างด้วย JS -->
            </div>

        </main>
    </div>

    <script>
        // เริ่มต้นใช้งาน Lucide Icons
        lucide.createIcons();

        // ข้อมูลจำลองสำหรับกริดวิดีโอ
        const mockVideos = [
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley', views: '1.4B', time: '14 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg' },
            { id: 'jNQXAC9IVRw', title: 'Me at the zoo', channel: 'jawed', views: '280M', time: '18 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/jNQXAC9IVRw/hqdefault.jpg' },
            { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE(강남스타일) M/V', channel: 'officialpsy', views: '4.9B', time: '11 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/9bZkp7q19f0/maxresdefault.jpg' },
            { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi', views: '8.2B', time: '6 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/kJQP7kiw5Fk/maxresdefault.jpg' },
            { id: 'CevxZvSJLk8', title: 'Katy Perry - Roar (Official)', channel: 'Katy Perry', views: '3.8B', time: '10 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/CevxZvSJLk8/maxresdefault.jpg' },
            { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', channel: 'Ed Sheeran', views: '6.1B', time: '6 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg' },
            { id: '09R8_2nJtjg', title: 'Maroon 5 - Sugar (Official Music Video)', channel: 'Maroon 5', views: '3.9B', time: '8 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/09R8_2nJtjg/maxresdefault.jpg' },
            { id: 'RgKAFK5djSk', title: 'Wiz Khalifa - See You Again ft. Charlie Puth', channel: 'Wiz Khalifa', views: '6B', time: '8 ปีที่ผ่านมา', thumb: 'https://img.youtube.com/vi/RgKAFK5djSk/maxresdefault.jpg' }
        ];

        // สร้างวิดีโอกริด
        const gridContainer = document.getElementById('video-grid');
        mockVideos.forEach(video => {
            const videoCard = document.createElement('div');
            videoCard.className = 'cursor-pointer group';
            videoCard.onclick = () => loadVideoByUrl(`https://www.youtube.com/watch?v=${video.id}`);
            
            videoCard.innerHTML = `
                <div class="relative w-full aspect-video bg-yt-dark rounded-xl overflow-hidden mb-3">
                    <img src="${video.thumb}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    <div class="absolute bottom-1 right-1 bg-black/80 text-white text-xs px-1.5 py-0.5 rounded">
                        4:20
                    </div>
                </div>
                <div class="flex gap-3 pr-2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${video.channel}" class="w-9 h-9 rounded-full bg-yt-dark mt-1">
                    <div class="flex flex-col">
                        <h3 class="text-sm font-medium line-clamp-2 text-yt-light group-hover:text-white">${video.title}</h3>
                        <p class="text-[13px] text-yt-gray mt-1">${video.channel}</p>
                        <p class="text-[13px] text-yt-gray">${video.views} การดู • ${video.time}</p>
                    </div>
                </div>
            `;
            gridContainer.appendChild(videoCard);
        });

        // ฟังก์ชันจัดการตอนกดปุ่มเล่นวิดีโอจาก Input
        function handlePlayUrl() {
            const inputElement = document.getElementById('url-input');
            const url = inputElement.value.trim();
            if (url) {
                loadVideoByUrl(url);
            } else {
                alert('กรุณาใส่ลิงก์วิดีโอก่อนครับ');
            }
        }

        // ฟังก์ชันประมวลผลลิงก์และสร้าง Player
        function loadVideoByUrl(url) {
            const container = document.getElementById('video-container');
            const wrapper = document.getElementById('player-wrapper');
            const welcomeMsg = document.getElementById('welcome-message');
            const titleElement = document.getElementById('video-title');
            
            // แสดง Player ซ่อน Welcome
            wrapper.style.display = 'block';
            welcomeMsg.style.display = 'none';
            
            // เลื่อนจอขึ้นไปด้านบนสุด
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });

            // เคลียร์วิดีโอเก่า
            container.innerHTML = '';

            const parsedData = parseVideoUrl(url);

            if (parsedData.type === 'youtube' || parsedData.type === 'iframe') {
                // สร้าง Iframe สำหรับ YouTube หรือ Google Drive
                container.innerHTML = `
                    <iframe 
                        src="${parsedData.src}" 
                        class="w-full h-full border-0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>`;
                titleElement.innerText = parsedData.type === 'youtube' ? 'กำลังเล่นวิดีโอจาก YouTube' : 'กำลังเล่นวิดีโอจาก Google Drive';
                
            } else if (parsedData.type === 'video') {
                // สร้าง HTML5 Video Element สำหรับ MP4
                container.innerHTML = `
                    <video 
                        src="${parsedData.src}" 
                        controls 
                        autoplay 
                        class="w-full h-full object-contain bg-black">
                        เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอนี้
                    </video>`;
                titleElement.innerText = 'กำลังเล่นไฟล์วิดีโอโดยตรง (MP4/URL)';
            } else {
                container.innerHTML = `<div class="flex items-center justify-center w-full h-full text-red-500 font-medium">ไม่รองรับรูปแบบลิงก์นี้ กรุณาตรวจสอบลิงก์อีกครั้ง</div>`;
            }
        }

        // ฟังก์ชันแยกวิเคราะห์ประเภทของ URL (สำคัญมากสำหรับการรองรับหลายแหล่ง)
        function parseVideoUrl(url) {
            try {
                // เช็ค YouTube
                if (url.includes('youtube.com/watch') || url.includes('youtu.be/') || url.includes('youtube.com/shorts/')) {
                    let videoId = '';
                    if (url.includes('youtube.com/watch')) {
                        videoId = new URL(url).searchParams.get('v');
                    } else if (url.includes('youtu.be/')) {
                        videoId = url.split('youtu.be/')[1].split('?')[0];
                    } else if (url.includes('youtube.com/shorts/')) {
                        videoId = url.split('/shorts/')[1].split('?')[0];
                    }
                    return { type: 'youtube', src: `https://www.youtube.com/embed/${videoId}?autoplay=1` };
                } 
                // เช็ค Google Drive
                else if (url.includes('drive.google.com/file/d/')) {
                    // ดึง ID ออกมาจากลิงก์ Drive
                    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                        const fileId = match[1];
                        // ใช้ /preview เพื่อให้สามารถฝัง (embed) ใน iframe ได้
                        return { type: 'iframe', src: `https://drive.google.com/file/d/${fileId}/preview` };
                    }
                } 
                // เช็คไฟล์วิดีโอทั่วไป (mp4, webm, etc.) หรือ URL ตรง
                else {
                    return { type: 'video', src: url };
                }
            } catch (error) {
                console.error('Error parsing URL:', error);
                return { type: 'error' };
            }
            return { type: 'video', src: url }; // fallback
        }

        // ฟังก์ชันจำลองปุ่มทดสอบ
        function loadSampleVideo(type) {
            const input = document.getElementById('url-input');
            if(type === 'youtube') {
                const sample = "https://www.youtube.com/watch?v=jNQXAC9IVRw";
                input.value = sample;
                loadVideoByUrl(sample);
            } else if(type === 'mp4') {
                const sample = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
                input.value = sample;
                loadVideoByUrl(sample);
            }
        }

        // กด Enter ที่ช่อง Input เพื่อเล่นได้เลย
        document.getElementById('url-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handlePlayUrl();
            }
        });

    </script>
</body>
</html>
